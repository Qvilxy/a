<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pentagram Mini App</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            overflow: hidden; /* Убираем прокрутку */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }

        canvas {
            display: block;
            /* Стили для позиционирования, реальный размер задается в JS */
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем приложение на весь экран

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, centerX, centerY, radius;
    let stars = [];
    let lines = [];
    let isAnimating = false;
    let animationFrameId;

    // Параметры звезд и линий
    const STAR_RADIUS = 10; // Радиус самой звезды (крестика)
    const PENTAGON_RADIUS_FACTOR = 0.35; // Радиус пятиугольника относительно размера экрана
    const LINE_WIDTH = 8; // Толщина линий (было 2, стало 8)
    const GLOW_BLUR = 15; // Сила размытия для свечения
    const GLOW_COLOR = 'white'; // Цвет свечения

    function resize() {
        // Учитываем плотность пикселей для четкости на мобильных устройствах
        const dpr = window.devicePixelRatio || 1;
        
        // Получаем логические размеры окна
        const logicalWidth = window.innerWidth;
        const logicalHeight = window.innerHeight;

        // Устанавливаем физические размеры canvas с учетом DPR
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;

        // Масштабируем контекст рисования
        ctx.scale(dpr, dpr);

        // Задаем CSS-размеры, чтобы canvas занимал правильный размер на экране
        canvas.style.width = `${logicalWidth}px`;
        canvas.style.height = `${logicalHeight}px`;

        // Все дальнейшие расчеты координат ведутся в логических пикселях
        width = logicalWidth;
        height = logicalHeight;
        centerX = width / 2;
        // Смещаем центр вверх, чтобы нижняя звезда оказалась "сильно внизу"
        centerY = height * 0.4; 
        radius = Math.min(width, height) * PENTAGON_RADIUS_FACTOR;
        
        calculateStarPositions();
        draw();
    }

    // Рассчитываем позиции 5 звезд (вершин ПЕРЕВЕРНУТОГО пятиугольника)
    function calculateStarPositions() {
        stars = [];
        // Начинаем с нижней точки (PI/2) и идем по часовой стрелке
        for (let i = 0; i < 5; i++) {
            const angle = (i * 2 * Math.PI / 5) + (Math.PI / 2);
            stars.push({
                x: centerX + radius * Math.cos(angle),
                y: centerY + radius * Math.sin(angle),
                index: i
            });
        }
    }

    // Функция для рисования одной звезды (крестика) со свечением
    function drawStar(x, y) {
        ctx.save(); // Сохраняем состояние контекста
        ctx.shadowColor = GLOW_COLOR;
        ctx.shadowBlur = GLOW_BLUR;
        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2; // Толщина линий самого крестика остается небольшой
        // Горизонтальная линия крестика
        ctx.moveTo(x - STAR_RADIUS, y);
        ctx.lineTo(x + STAR_RADIUS, y);
        // Вертикальная линия крестика
        ctx.moveTo(x, y - STAR_RADIUS);
        ctx.lineTo(x, y + STAR_RADIUS);
        ctx.stroke();
        ctx.restore(); // Восстанавливаем состояние контекста
    }

    // Основная функция отрисовки
    function draw() {
        // Очищаем холст
        ctx.clearRect(0, 0, width, height);

        // Рисуем все существующие линии СО СВЕЧЕНИЕМ
        lines.forEach(line => {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH; // Используем новую толщину
            ctx.lineCap = 'round'; // Делаем концы линий закругленными
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
            ctx.restore();
        });

        // Если идет анимация, рисуем текущую анимируемую линию СО СВЕЧЕНИЕМ
        if (isAnimating && currentAnimationLine) {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(currentAnimationLine.startX, currentAnimationLine.startY);
            ctx.lineTo(currentAnimationLine.currentX, currentAnimationLine.currentY);
            ctx.stroke();
            ctx.restore();
        }

        // Рисуем все звезды ПОВЕРХ линий
        stars.forEach(star => drawStar(star.x, star.y));
    }

    let currentAnimationLine = null;

    // Логика анимации
    function animateLine(startPoint, endPoint, callback) {
        const duration = 500; // Чуть замедлил анимацию для красоты
        const startTime = performance.now();

        currentAnimationLine = {
            startX: startPoint.x,
            startY: startPoint.y,
            endX: endPoint.x,
            endY: endPoint.y,
            currentX: startPoint.x,
            currentY: startPoint.y
        };

        function step(timestamp) {
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // Линейная интерполяция (lerp) для плавного движения
            currentAnimationLine.currentX = startPoint.x + (endPoint.x - startPoint.x) * progress;
            currentAnimationLine.currentY = startPoint.y + (endPoint.y - startPoint.y) * progress;

            draw();

            if (progress < 1) {
                animationFrameId = requestAnimationFrame(step);
            } else {
                // Анимация линии завершена
                currentAnimationLine = null;
                // Добавляем завершенную линию в массив
                lines.push({
                    startX: startPoint.x,
                    startY: startPoint.y,
                    endX: endPoint.x,
                    endY: endPoint.y
                });
                draw(); // Перерисовываем с новой линией
                callback(); // Вызываем коллбек для следующей линии
            }
        }
        animationFrameId = requestAnimationFrame(step);
    }

    // Последовательность соединения точек для пентаграммы
    // Индексы звезд для ПЕРЕВЕРНУТОГО пятиугольника:
    // 0(низ), 1(лево-низ), 2(лево-верх), 3(право-верх), 4(право-низ)
    // Порядок соединения: 0->2, 2->4, 4->1, 1->3, 3->0
    const CONNECTION_ORDER = [
        { from: 0, to: 2 },
        { from: 2, to: 4 },
        { from: 4, to: 1 },
        { from: 1, to: 3 },
        { from: 3, to: 0 }
    ];

    function startPentagramAnimation(startStarIndex) {
        if (isAnimating || lines.length > 0) return; // Не запускаем, если уже идет анимация или рисунок готов

        isAnimating = true;
        lines = []; // Очищаем предыдущие линии, если были
        
        // Находим, с какого шага начать, исходя из нажатой звезды
        let startIndexInOrder = CONNECTION_ORDER.findIndex(conn => conn.from === startStarIndex);
        
        // Если нажали на звезду, которая не является началом ни одного соединения в нашем порядке,
        // начинаем с первого доступного соединения.
        if (startIndexInOrder === -1) {
             startIndexInOrder = 0;
        }

        let currentStep = startIndexInOrder;

        function drawNextLine() {
            if (currentStep >= CONNECTION_ORDER.length) {
                // Все линии нарисованы
                isAnimating = false;
                return;
            }

            const connection = CONNECTION_ORDER[currentStep];
            const startPoint = stars[connection.from];
            const endPoint = stars[connection.to];

            animateLine(startPoint, endPoint, () => {
                currentStep++;
                drawNextLine();
            });
        }

        drawNextLine();
    }

    // Обработка кликов/тапов
    function handleInput(clientX, clientY) {
        // Проверяем, попал ли клик по какой-либо звезде
        for (let star of stars) {
            const dx = clientX - star.x;
            const dy = clientY - star.y;
            // Увеличиваем область нажатия для удобства
            if (dx * dx + dy * dy < (STAR_RADIUS * 3) ** 2) {
                startPentagramAnimation(star.index);
                break;
            }
        }
    }

    // Слушатели событий
    canvas.addEventListener('click', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        // Предотвращаем двойное срабатывание (click + touchstart)
        e.preventDefault(); 
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('resize', resize);

    // Первый запуск
    resize();

</script>

</body>
</html>
