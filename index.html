<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Мое Мини-Приложение</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Экран загрузки с видео -->
  <div id="splash-screen">
    <!-- autoplay: автозапуск, muted: без звука (обязательно для автоплея), playsinline: для iOS -->
    <video id="loading-video" autoplay muted playsinline>
      <source src="rose-loading.mp4" type="video/mp4">
      Ваш браузер не поддерживает видео.
    </video>
  </div>

  <!-- Основной контент приложения -->
  <div id="app-content">
    <header>
      <h1>🌹 Добро пожаловать!</h1>
    </header>
    <main>
      <p>Анимация завершена. Интерфейс загружен.</p>
      <!-- Ваш основной контент -->
    </main>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
