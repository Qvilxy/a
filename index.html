<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pear Skate Clo.</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hidden { opacity: 0; visibility: hidden; }
        #loading-screen img { width: 160px; }

        #app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #app-container.visible { display: flex; }

        /* ===== ШАПКА ===== */
        .header {
            position: relative;
            flex-shrink: 0;
            z-index: 15;
            background: #7388A3;
            padding-top: var(--safe-top, 0px);
        }

        .header-top {
            height: 100px;
            position: relative;
        }

        .menu-btn {
            position: absolute;
            left: calc(22% - 45px);
            top: 68%;
            transform: translate(-50%, -50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .menu-btn img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            display: block;
        }

        /* Логотип кликабельный */
        .logo-wrapper {
            position: absolute;
            top: 52%;
            left: 44%;
            transform: translate(-50%, -40%);
            z-index: 20;
            width: 180px;
            height: 115px;
            cursor: pointer;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
        }

        .header-right {
            position: absolute;
            right: 16px;
            top: 68%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            display: block;
        }

        .header-bottom {
            background: #15355B;
            height: 22px;
        }

        /* ===== БОКОВОЕ МЕНЮ ===== */
        .side-menu-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .side-menu-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* Меню уже, опущено вниз */
        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            max-width: 70%;
            height: 100%;
            background: #fff;
            z-index: 60;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 100px 20px 24px;
            overflow-y: auto;
        }
        .side-menu.show {
            transform: translateX(0);
        }

        .side-menu h3 {
            font-size: 18px;
            font-weight: 700;
            color: #111;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .side-menu h3:first-child {
            margin-top: 0;
        }

        .side-menu ul {
            list-style: none;
            padding: 0;
            margin: 0 0 4px 0;
        }

        .side-menu li {
            padding: 5px 4px;
            font-size: 15px;
            color: #333;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .side-menu li:active { background: #f0f0f0; }

        /* ===== КОНТЕНТ ===== */
        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #f0f0f0;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
        }
        .page.active { display: block; }

        /* ===== СЛАЙД-ШОУ ===== */
        .slideshow {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: pan-y;
        }

        .slideshow-track {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slideshow-track.no-transition { transition: none; }
        .slideshow-track.dragging { transition: none; }

        .slide {
            width: 33.3333%;
            height: 100%;
            flex-shrink: 0;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            image-rendering: auto;
            image-rendering: -webkit-optimize-contrast;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .slideshow-indicators {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator {
            height: 4px;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .indicator.active { width: 32px; background: #fff; }
        .indicator.inactive { width: 16px; background: rgba(255,255,255,0.5); }

        .dev-page {
            background: #f0f0f0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .dev-page.active { display: flex; }
        .dev-page h2 { font-size: 24px; color: #333; }
        .dev-page p { color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="vetka.png" alt="Loading">
    </div>

    <div id="app-container">

        <div class="header">
            <div class="header-top">
                <button class="menu-btn" onclick="toggleMenu()">
                    <img src="menu.png" alt="Меню">
                </button>

                <div class="logo-wrapper" onclick="goHome()">
                    <img src="sticker.png" alt="Pear Skate Clo.">
                </div>

                <div class="header-right">
                    <button class="icon-btn" onclick="openPage('korzina')">
                        <img src="iconkorzina.png" alt="Корзина">
                    </button>
                    <button class="icon-btn" onclick="openPage('profile')">
                        <img src="iconprofile.png" alt="Профиль">
                    </button>
                </div>
            </div>
            <div class="header-bottom"></div>
        </div>

        <div class="content">
            <div class="page active" id="page-home">
                <div class="slideshow" id="slideshow">
                    <div class="slideshow-track" id="slideshow-track">
                        <div class="slide"><img src="sadtree.png" alt="Slide 1"></div>
                        <div class="slide"><img src="voda.png" alt="Slide 2"></div>
                        <div class="slide"><img src="sadtree.png" alt="Slide 1 clone"></div>
                    </div>
                    <div class="slideshow-indicators">
                        <div class="indicator active" id="ind-0"></div>
                        <div class="indicator inactive" id="ind-1"></div>
                    </div>
                </div>
            </div>

            <div class="page dev-page" id="page-korzina">
                <h2> Корзина</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-profile">
                <h2>👤 Профиль</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-faq">
                <h2>❓ F.A.Q.</h2>
                <p>В разработке</p>
            </div>
        </div>
    </div>

    <div class="side-menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <h3>Каталог:</h3>
        <ul>
            <li onclick="closeMenu()">Худи</li>
            <li onclick="closeMenu()">Футболки</li>
            <li onclick="closeMenu()">Штаны</li>
            <li onclick="closeMenu()">Шляпы</li>
            <li onclick="closeMenu()">Аксессуары</li>
        </ul>
        <h3>Разделы:</h3>
        <ul>
            <li onclick="goHome()">Главная</li>
            <li onclick="closeMenu()">Сертификаты</li>
            <li onclick="closeMenu()">Контакты</li>
        </ul>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;

        function applySafeArea() {
            let top = 0;
            if (tg && tg.safeAreaInset && tg.safeAreaInset.top) {
                top = tg.safeAreaInset.top;
            } else {
                top = 20;
            }
            document.documentElement.style.setProperty('--safe-top', top + 'px');
        }

        if (tg) {
            tg.ready();
            tg.expand();
            setTimeout(applySafeArea, 100);
        } else {
            applySafeArea();
        }

        let history = ['home'];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + id);
            if (page) page.classList.add('active');
        }

        function openPage(id) {
            history.push(id);
            showPage(id);
            if (tg?.BackButton) tg.BackButton.show();
        }

        function goBack() {
            if (history.length > 1) {
                history.pop();
                showPage(history[history.length - 1]);
            }
            if (history.length === 1 && tg?.BackButton) tg.BackButton.hide();
        }

        tg?.BackButton?.onClick(goBack);

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('show');
            document.getElementById('menu-overlay').classList.toggle('show');
        }

        function closeMenu() {
            document.getElementById('side-menu').classList.remove('show');
            document.getElementById('menu-overlay').classList.remove('show');
        }

        function goHome() {
            closeMenu();
            history = ['home'];
            showPage('home');
            if (tg?.BackButton) tg.BackButton.hide();
        }

        // ===== СЛАЙД-ШОУ =====
        const track = document.getElementById('slideshow-track');
        const slideshow = document.getElementById('slideshow');
        const indicators = [document.getElementById('ind-0'), document.getElementById('ind-1')];

        let currentPos = 0;
        let autoplayTimer;
        let isDragging = false;
        let startX = 0;

        function getTranslatePercent(pos) { return -(pos * 33.3333); }

        function updateIndicators(realIndex) {
            indicators.forEach((ind, i) => {
                ind.className = i === realIndex ? 'indicator active' : 'indicator inactive';
            });
        }

        function moveTo(pos, animate = true) {
            currentPos = pos;
            if (!animate) track.classList.add('no-transition');
            else track.classList.remove('no-transition');
            track.style.transform = `translateX(${getTranslatePercent(pos)}%)`;
            let realIndex = pos === 2 ? 0 : pos;
            updateIndicators(realIndex);
        }

        function nextSlide() {
            if (currentPos === 1) {
                moveTo(2, true);
                setTimeout(() => { moveTo(0, false); }, 500);
            } else {
                moveTo(currentPos + 1, true);
            }
            resetAutoplay();
        }

        function prevSlide() {
            if (currentPos === 0) {
                moveTo(2, false);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => { moveTo(1, true); });
                });
            } else {
                moveTo(currentPos - 1, true);
            }
            resetAutoplay();
        }

        function resetAutoplay() {
            clearInterval(autoplayTimer);
            autoplayTimer = setInterval(nextSlide, 5000);
        }

        slideshow.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            track.classList.add('dragging');
        }, { passive: true });

        slideshow.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const diff = e.touches[0].clientX - startX;
            const baseOffset = getTranslatePercent(currentPos);
            const percentDiff = (diff / slideshow.offsetWidth) * 100;
            track.style.transform = `translateX(${baseOffset + percentDiff / 3}%)`;
        }, { passive: true });

        slideshow.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            track.classList.remove('dragging');
            const endX = e.changedTouches[0].clientX;
            const diff = endX - startX;
            const threshold = slideshow.offsetWidth * 0.2;
            if (diff < -threshold) nextSlide();
            else if (diff > threshold) prevSlide();
            else moveTo(currentPos, true);
        }, { passive: true });

        moveTo(0, false);
        resetAutoplay();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-container').classList.add('visible');
            }, 1500);
        });
    </script>
</body>
</html>
