<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pear Skate Clo.</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hidden { opacity: 0; visibility: hidden; }
        #loading-screen img { width: 160px; }

        #app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #app-container.visible { display: flex; }

        .header {
            position: relative;
            background: #245484;
            padding-top: var(--safe-top, 20px);
            height: 130px;
            flex-shrink: 0;
        }

        .header-native-space { height: 52px; }

        .header-icons {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 calc(25% - 47px);
            margin-top: 37px;
            position: relative;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            display: block;
        }

        .logo-wrapper {
            position: absolute;
            bottom: -27px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 115px;
            height: 115px;
            background: #245484;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .text-bar {
            position: relative;
            background: #101421;
            flex-shrink: 0;
            height: 27px;
            margin-top: 0;
        }

        .text-btn {
            position: absolute;
            top: 50%;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .text-btn:active { background: rgba(255,255,255,0.1); }
        .text-btn span {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }

        .text-btn-catalog {
            left: calc(25% - 47px + 18px);
            transform: translate(-50%, -50%);
        }

        .text-btn-faq {
            right: calc(25% - 47px + 18px);
            transform: translate(50%, -50%);
        }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
        }
        .page.active { display: block; }

        /* ===== СЛАЙД-ШОУ ===== */
        .slideshow {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: pan-y;
        }

        .slideshow-track {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideshow-track.dragging {
            transition: none;
        }

        .slide {
            width: 50%;
            height: 100%;
            flex-shrink: 0;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* Индикаторы */
        .slideshow-indicators {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator {
            height: 6px;
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .indicator.active {
            width: 32px;
            background: #fff;
        }

        .indicator.inactive {
            width: 16px;
            background: rgba(255, 255, 255, 0.4);
        }

        /* Страницы "В разработке" */
        .dev-page {
            background: #f0f0f0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .dev-page.active { display: flex; }
        .dev-page h2 { font-size: 24px; color: #333; }
        .dev-page p { color: #888; font-size: 16px; }

        /* Виджет каталога */
        .catalog-widget {
            position: absolute;
            top: 0;
            left: 0;
            width: 60%;
            max-width: none;
            background: #fff;
            border-radius: 0 0 30px 30px;
            padding: 18px 20px 22px;
            z-index: 30;
            transform: translateY(-10px);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s, visibility 0.25s;
            box-shadow: 0 6px 24px rgba(0,0,0,0.2);
        }
        .catalog-widget.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        @media (min-width: 600px) {
            .catalog-widget {
                left: calc(25% - 47px + 18px);
                transform: translateX(-50%) translateY(-10px);
                width: 42%;
                max-width: 220px;
            }
            .catalog-widget.show {
                transform: translateX(-50%) translateY(0);
            }
        }

        .catalog-widget ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .catalog-widget li {
            padding: 10px 4px;
            font-size: 16px;
            color: #999;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }

        .catalog-widget li:active {
            background: #f0f0f0;
            color: #555;
        }

        .catalog-widget li + li {
            border-top: 1px solid #f0f0f0;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 25;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="vetka.png" alt="Loading">
    </div>

    <div id="app-container">

        <div class="header">
            <div class="header-native-space"></div>

            <div class="header-icons">
                <button class="icon-btn" onclick="openPage('korzina')">
                    <img src="korzina.png" alt="Корзина">
                </button>
                <button class="icon-btn" onclick="openPage('profile')">
                    <img src="profile.png" alt="Профиль">
                </button>
            </div>

            <div class="logo-wrapper">
                <img src="logo.png" alt="Pear Skate Clo.">
            </div>
        </div>

        <div class="text-bar">
            <button class="text-btn text-btn-catalog" onclick="openCatalog()">
                <span>Каталог</span>
            </button>
            <button class="text-btn text-btn-faq" onclick="openPage('faq')">
                <span>F.A.Q.</span>
            </button>
        </div>

        <div class="content">
            <!-- Главная страница со слайд-шоу -->
            <div class="page active" id="page-home">
                <div class="slideshow" id="slideshow">
                    <div class="slideshow-track" id="slideshow-track">
                        <div class="slide"><img src="sadtree.png" alt="Slide 1"></div>
                        <div class="slide"><img src="voda.png" alt="Slide 2"></div>
                    </div>
                    <div class="slideshow-indicators">
                        <div class="indicator active" id="ind-0"></div>
                        <div class="indicator inactive" id="ind-1"></div>
                    </div>
                </div>
            </div>

            <div class="page dev-page" id="page-korzina">
                <h2>🛒 Корзина</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-profile">
                <h2>👤 Профиль</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-faq">
                <h2>❓ F.A.Q.</h2>
                <p>В разработке</p>
            </div>

            <div class="catalog-widget" id="catalog-widget">
                <ul>
                    <li>Худи / Худи на молнии</li>
                    <li>Футболки / Лонгсливы</li>
                    <li>Низ</li>
                    <li>Верхняя одежда</li>
                    <li>Аксессуары</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCatalog()"></div>

    <script>
        const tg = window.Telegram?.WebApp;

        function applySafeArea() {
            if (tg && tg.safeAreaInset) {
                document.documentElement.style.setProperty('--safe-top', tg.safeAreaInset.top + 'px');
            }
        }
        applySafeArea();
        if (tg) { tg.ready(); tg.expand(); }

        let history = ['home'];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + id);
            if (page) page.classList.add('active');
        }

        function openPage(id) {
            history.push(id);
            showPage(id);
            if (tg?.BackButton) tg.BackButton.show();
        }

        function goBack() {
            if (history.length > 1) {
                history.pop();
                showPage(history[history.length - 1]);
            }
            if (history.length === 1 && tg?.BackButton) tg.BackButton.hide();
        }

        tg?.BackButton?.onClick(goBack);

        function openCatalog() {
            document.getElementById('catalog-widget').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        function closeCatalog() {
            document.getElementById('catalog-widget').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        document.querySelectorAll('.catalog-widget li').forEach(li => {
            li.addEventListener('click', () => {
                closeCatalog();
            });
        });

        // ===== СЛАЙД-ШОУ =====
        const track = document.getElementById('slideshow-track');
        const indicators = [document.getElementById('ind-0'), document.getElementById('ind-1')];
        const totalSlides = 2;
        let currentSlide = 0;
        let autoplayTimer;
        let isDragging = false;
        let startX = 0;
        let currentTranslate = 0;

        function goToSlide(index) {
            currentSlide = index;
            const offset = -index * 50; // 50% потому что track = 200%, каждый слайд = 50%
            track.style.transform = `translateX(${offset}%)`;

            // Обновляем индикаторы
            indicators.forEach((ind, i) => {
                if (i === index) {
                    ind.className = 'indicator active';
                } else {
                    ind.className = 'indicator inactive';
                }
            });

            resetAutoplay();
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % totalSlides);
        }

        function prevSlide() {
            goToSlide((currentSlide - 1 + totalSlides) % totalSlides);
        }

        function resetAutoplay() {
            clearInterval(autoplayTimer);
            autoplayTimer = setInterval(nextSlide, 5000);
        }

        // Свайп
        const slideshow = document.getElementById('slideshow');

        slideshow.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            track.classList.add('dragging');
        }, { passive: true });

        slideshow.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const diff = e.touches[0].clientX - startX;
            const baseOffset = -currentSlide * 50;
            // Конвертируем пиксели в проценты от ширины трека
            const percentDiff = (diff / slideshow.offsetWidth) * 100;
            track.style.transform = `translateX(${baseOffset + percentDiff / 2}%)`;
        }, { passive: true });

        slideshow.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            track.classList.remove('dragging');
            const endX = e.changedTouches[0].clientX;
            const diff = endX - startX;
            const threshold = slideshow.offsetWidth * 0.2;

            if (diff < -threshold) {
                nextSlide();
            } else if (diff > threshold) {
                prevSlide();
            } else {
                goToSlide(currentSlide);
            }
        }, { passive: true });

        // Запуск автоплея
        resetAutoplay();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-container').classList.add('visible');
            }, 1500);
        });
    </script>
</body>
</html>
