<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pentagram Mini App</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон по умолчанию */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            transition: background-color 2s ease; /* Плавный переход цвета фона */
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, centerX, centerY, radius;
    let stars = [];
    
    // Массивы для хранения линий
    let whiteLines = [];
    let redLines = [];
    
    let isAnimating = false;
    let animationFrameId;
    
    // Состояние приложения
    let isWhitePentagramDone = false;
    let isRedPentagramDone = false;

    // Параметры
    const DIAMOND_SIZE = 6; 
    const PENTAGON_RADIUS_FACTOR = 0.35; 
    const LINE_WIDTH = 8; 
    const WHITE_GLOW_BLUR = 15; 
    const RED_GLOW_BLUR = 30; // Усиленное свечение для красного, чтобы "сливалось" с фоном
    const BOTTOM_STAR_OFFSET = 100; 

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const logicalWidth = window.innerWidth;
        const logicalHeight = window.innerHeight;

        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);

        canvas.style.width = `${logicalWidth}px`;
        canvas.style.height = `${logicalHeight}px`;

        width = logicalWidth;
        height = logicalHeight;
        centerX = width / 2;
        centerY = height * 0.45; 
        
        radius = Math.min(width, height) * PENTAGON_RADIUS_FACTOR;
        
        calculateStarPositions();
        draw();
    }

    function calculateStarPositions() {
        stars = [];
        const tempStars = [];
        for (let i = 0; i < 5; i++) {
            const angle = (i * 2 * Math.PI / 5) + (Math.PI / 2);
            tempStars.push({
                x: centerX + radius * Math.cos(angle),
                y: centerY + radius * Math.sin(angle),
                index: i
            });
        }

        stars = tempStars.map(star => {
            if (star.index === 0) {
                return { ...star, y: star.y + BOTTOM_STAR_OFFSET };
            }
            return star;
        });
    }

    function drawDiamond(x, y, color = 'white') {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = color === 'white' ? WHITE_GLOW_BLUR : RED_GLOW_BLUR;
        ctx.fillStyle = color;
        
        ctx.beginPath();
        ctx.moveTo(x, y - DIAMOND_SIZE);
        ctx.lineTo(x + DIAMOND_SIZE, y);
        ctx.lineTo(x, y + DIAMOND_SIZE);
        ctx.lineTo(x - DIAMOND_SIZE, y);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // 1. Рисуем белые линии
        whiteLines.forEach(line => {
            ctx.save();
            ctx.shadowColor = 'white';
            ctx.shadowBlur = WHITE_GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
            ctx.restore();
        });

        // 2. Рисуем текущую анимируемую белую линию (если есть)
        if (isAnimating && currentAnimationLine && !isRedMode) {
            ctx.save();
            ctx.shadowColor = 'white';
            ctx.shadowBlur = WHITE_GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(currentAnimationLine.startX, currentAnimationLine.startY);
            ctx.lineTo(currentAnimationLine.currentX, currentAnimationLine.currentY);
            ctx.stroke();
            ctx.restore();
        }

        // 3. Рисуем красные линии (поверх белых)
        redLines.forEach(line => {
            ctx.save();
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = RED_GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = '#aa0000'; // Темно-красный цвет линии
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
            ctx.restore();
        });

        // 4. Рисуем текущую анимируемую красную линию (если есть)
        if (isAnimating && currentAnimationLine && isRedMode) {
            ctx.save();
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = RED_GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = '#aa0000';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(currentAnimationLine.startX, currentAnimationLine.startY);
            ctx.lineTo(currentAnimationLine.currentX, currentAnimationLine.currentY);
            ctx.stroke();
            ctx.restore();
        }

        // 5. Рисуем звезды поверх всего
        // Если красный режим активен, звезды тоже можно сделать красными или оставить белыми для контраста.
        // Давайте сделаем их темно-красными, чтобы они "сливались"
        const starColor = isRedMode || isRedPentagramDone ? '#aa0000' : 'white';
        stars.forEach(star => drawDiamond(star.x, star.y, starColor));
    }

    let currentAnimationLine = null;
    let isRedMode = false; // Флаг, указывающий, что мы сейчас рисуем красную пентаграмму

    function animateLine(startPoint, endPoint, callback, colorType) {
        const duration = 500;
        const startTime = performance.now();

        currentAnimationLine = {
            startX: startPoint.x,
            startY: startPoint.y,
            endX: endPoint.x,
            endY: endPoint.y,
            currentX: startPoint.x,
            currentY: startPoint.y
        };

        function step(timestamp) {
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);

            currentAnimationLine.currentX = startPoint.x + (endPoint.x - startPoint.x) * progress;
            currentAnimationLine.currentY = startPoint.y + (endPoint.y - startPoint.y) * progress;

            draw();

            if (progress < 1) {
                animationFrameId = requestAnimationFrame(step);
            } else {
                currentAnimationLine = null;
                // Добавляем линию в соответствующий массив
                if (colorType === 'red') {
                    redLines.push({
                        startX: startPoint.x,
                        startY: startPoint.y,
                        endX: endPoint.x,
                        endY: endPoint.y
                    });
                } else {
                    whiteLines.push({
                        startX: startPoint.x,
                        startY: startPoint.y,
                        endX: endPoint.x,
                        endY: endPoint.y
                    });
                }
                
                draw();
                callback();
            }
        }
        animationFrameId = requestAnimationFrame(step);
    }

    const CONNECTION_ORDER = [
        { from: 0, to: 2 },
        { from: 2, to: 4 },
        { from: 4, to: 1 },
        { from: 1, to: 3 },
        { from: 3, to: 0 }
    ];

    function startPentagramAnimation(startStarIndex) {
        if (isAnimating) return; // Не прерываем текущую анимацию

        // Сценарий 1: Белая пентаграмма еще не нарисована
        if (!isWhitePentagramDone) {
            isAnimating = true;
            whiteLines = [];
            redLines = [];
            isRedMode = false;
            
            // Сброс фона на черный
            document.body.style.backgroundColor = '#000000';

            let startIndexInOrder = CONNECTION_ORDER.findIndex(conn => conn.from === startStarIndex);
            if (startIndexInOrder === -1) startIndexInOrder = 0;

            let stepsDrawn = 0;
            let currentStep = startIndexInOrder;

            function drawNextWhiteLine() {
                if (stepsDrawn >= 5) {
                    isAnimating = false;
                    isWhitePentagramDone = true;
                    return;
                }

                const connection = CONNECTION_ORDER[currentStep % CONNECTION_ORDER.length];
                const startPoint = stars[connection.from];
                const endPoint = stars[connection.to];

                animateLine(startPoint, endPoint, () => {
                    stepsDrawn++;
                    currentStep++;
                    drawNextWhiteLine();
                }, 'white');
            }
            drawNextWhiteLine();
        } 
        // Сценарий 2: Белая уже есть, красной еще нет -> Рисуем красную
        else if (isWhitePentagramDone && !isRedPentagramDone) {
            isAnimating = true;
            redLines = []; // Очищаем красные линии перед новой отрисовкой
            isRedMode = true;

            // Анимация смены фона на темно-красный
            document.body.style.backgroundColor = '#4a0000'; // Темно-красный фон

            let startIndexInOrder = CONNECTION_ORDER.findIndex(conn => conn.from === startStarIndex);
            if (startIndexInOrder === -1) startIndexInOrder = 0;

            let stepsDrawn = 0;
            let currentStep = startIndexInOrder;

            function drawNextRedLine() {
                if (stepsDrawn >= 5) {
                    isAnimating = false;
                    isRedPentagramDone = true;
                    return;
                }

                const connection = CONNECTION_ORDER[currentStep % CONNECTION_ORDER.length];
                const startPoint = stars[connection.from];
                const endPoint = stars[connection.to];

                animateLine(startPoint, endPoint, () => {
                    stepsDrawn++;
                    currentStep++;
                    drawNextRedLine();
                }, 'red');
            }
            drawNextRedLine();
        }
        // Сценарий 3: Обе пентаграммы есть -> Можно сбросить или ничего не делать
        else {
            // Опционально: сброс при третьем нажатии
            resetApp();
        }
    }

    function resetApp() {
        whiteLines = [];
        redLines = [];
        isWhitePentagramDone = false;
        isRedPentagramDone = false;
        isRedMode = false;
        document.body.style.backgroundColor = '#000000';
        draw();
    }

    function handleInput(clientX, clientY) {
        for (let star of stars) {
            const dx = clientX - star.x;
            const dy = clientY - star.y;
            if (dx * dx + dy * dy < (DIAMOND_SIZE * 4) ** 2) {
                startPentagramAnimation(star.index);
                break;
            }
        }
    }

    canvas.addEventListener('click', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        e.preventDefault(); 
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('resize', resize);

    resize();

</script>

</body>
</html>
