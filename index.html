<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Telegram Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f5f5f7;
      --blue: #007aff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      overflow: hidden;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #splash img {
      width: 100px;
      height: 100px;
    }

    /* APP */
    #app {
      display: none;
      height: 100vh;
      padding-top: env(safe-area-inset-top);
    }

    /* HEADER */
    .header {
      height: 140px;
      position: relative;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(270deg, #6a11cb, #b16cea, #8e54e9, #6a11cb);
      background-size: 400% 400%;
      animation: gradientFlow 8s ease infinite;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(20px);
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* LOGO */
    .logo-box {
      position: absolute;
      left: 50%;
      bottom: -25px;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      background: red;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .logo-box img {
      width: 40px;
      height: 40px;
    }

    /* CONTENT */
    .content {
      padding: 50px 16px 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      height: 120px;
      background: #b8e994;
      border-radius: 14px;
    }

    /* PAGES */
    .page {
      position: absolute;
      inset: 0;
      padding-bottom: 100px;
      transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    }

    #home { transform: translateX(0%); }
    #profile { transform: translateX(100%); }

    /* NAV */
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 60px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.4);
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 5px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* INDICATOR */
    .indicator {
      position: absolute;
      height: 50px;
      width: 50%;
      background: rgba(200,200,200,0.6);
      border-radius: 25px;
      transition: transform 0.35s cubic-bezier(.22,1,.36,1);
    }

    /* NAV ITEMS */
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #888;
      z-index: 2;
      transition: 0.3s;
    }

    .nav-item.active {
      color: var(--blue);
    }

    .dragging .indicator {
      transition: none;
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <img src="logoredbox.png" />
  </div>

  <!-- APP -->
  <div id="app">

    <!-- HOME -->
    <div id="home" class="page">
      <div class="header">
        <div class="logo-box">
          <img src="logoredbox.png">
        </div>
      </div>

      <div class="content">
        <h2>Категории</h2>

        <div class="grid">
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="page">
      <div class="content">
        <h2>Профиль</h2>
      </div>
    </div>

    <!-- NAV -->
    <div class="nav" id="nav">
      <div class="indicator" id="indicator"></div>

      <div class="nav-item active">Главная</div>
      <div class="nav-item">Профиль</div>
    </div>

  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const splash = document.getElementById("splash");
    const app = document.getElementById("app");

    setTimeout(() => {
      splash.style.opacity = 0;

      setTimeout(() => {
        splash.style.display = "none";
        app.style.display = "block";
      }, 600);
    }, 1200);

    let current = 0;

    const pages = [
      document.getElementById("home"),
      document.getElementById("profile")
    ];

    const indicator = document.getElementById("indicator");
    const nav = document.getElementById("nav");

    function updateUI() {
      pages[0].style.transform = `translateX(${-current * 100}%)`;
      pages[1].style.transform = `translateX(${100 - current * 100}%)`;

      indicator.style.transform = `translateX(${current * 100}%)`;

      document.querySelectorAll(".nav-item").forEach((el, i) => {
        el.classList.toggle("active", i === current);
      });
    }

    updateUI();

    // SWIPE
    let startX = 0;
    let dragging = false;

    nav.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      dragging = true;
      nav.classList.add("dragging");
    });

    nav.addEventListener("touchmove", (e) => {
      if (!dragging) return;

      let dx = e.touches[0].clientX - startX;
      let percent = dx / nav.offsetWidth;

      let temp = Math.min(1, Math.max(0, current - percent));
      indicator.style.transform = `translateX(${temp * 100}%)`;
    });

    nav.addEventListener("touchend", (e) => {
      dragging = false;
      nav.classList.remove("dragging");

      let dx = e.changedTouches[0].clientX - startX;

      if (dx > 50) current = 0;
      else if (dx < -50) current = 1;

      updateUI();
    });

    // TAP
    document.querySelectorAll(".nav-item").forEach((el, i) => {
      el.onclick = () => {
        current = i;
        updateUI();
      };
    });
  </script>

</body>
</html>
