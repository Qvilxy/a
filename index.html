<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pear Skate Clo.</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hidden { opacity: 0; visibility: hidden; }
        #loading-screen img {
            width: 160px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }

        #app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #app-container.visible { display: flex; }

        .header {
            position: relative;
            background: #245484;
            padding-top: var(--safe-top, 20px);
            height: 147px;
            flex-shrink: 0;
        }

        .header-native-space { height: 52px; }

        .header-icons {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 40px;
            margin-top: 37px;
            position: relative;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-wrapper {
            position: absolute;
            bottom: -27px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 115px;
            height: 115px;
            background: #245484;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* Цвет полоски изменён на #101421 */
        .text-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #101421;
            padding: 0 30px;
            flex-shrink: 0;
            height: 27px;
        }

        .text-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }
        .text-btn:active { background: rgba(255,255,255,0.1); }
        .text-btn span {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }

        .text-center-spacer { width: 100px; }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
        }
        .page.active { display: block; }

        .banner {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .dev-page {
            background: #f0f0f0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .dev-page.active { display: flex; }
        .dev-page h2 { font-size: 24px; color: #333; }
        .dev-page p { color: #888; font-size: 16px; }

        .catalog-widget {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            width: 90%;
            max-width: 340px;
            background: #fff;
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            z-index: 30;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }
        .catalog-widget.show { transform: translateX(-50%) translateY(0); }
        .catalog-widget p { font-size: 17px; color: #444; margin-bottom: 18px; }
        .catalog-widget button {
            background: #245484;
            color: #fff;
            border: none;
            padding: 11px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 25;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="vetka.png" alt="Loading">
    </div>

    <div id="app-container">

        <div class="header">
            <div class="header-native-space"></div>

            <div class="header-icons">
                <button class="icon-btn" onclick="openPage('korzina')">
                    <img src="korzina.png" alt="Корзина">
                </button>
                <button class="icon-btn" onclick="openPage('profile')">
                    <img src="profile.png" alt="Профиль">
                </button>
            </div>

            <div class="logo-wrapper">
                <img src="logo.png" alt="Pear Skate Clo.">
            </div>
        </div>

        <div class="text-bar">
            <button class="text-btn" onclick="openCatalog()">
                <span>Каталог</span>
            </button>
            <div class="text-center-spacer"></div>
            <button class="text-btn" onclick="openPage('faq')">
                <span>F.A.Q.</span>
            </button>
        </div>

        <div class="content">
            <div class="page active" id="page-home">
                <img src="sadtree.png" class="banner" alt="Banner">
            </div>
            <div class="page dev-page" id="page-korzina">
                <h2> Корзина</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-profile">
                <h2>👤 Профиль</h2>
                <p>В разработке</p>
            </div>
            <div class="page dev-page" id="page-faq">
                <h2>❓ F.A.Q.</h2>
                <p>В разработке</p>
            </div>
        </div>

        <div class="catalog-widget" id="catalog-widget">
            <p>📦 Товаров ещё нет</p>
            <button onclick="closeCatalog()">Понятно</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCatalog()"></div>

    <script>
        const tg = window.Telegram?.WebApp;

        function applySafeArea() {
            if (tg && tg.safeAreaInset) {
                document.documentElement.style.setProperty('--safe-top', tg.safeAreaInset.top + 'px');
            }
        }
        applySafeArea();
        if (tg) { tg.ready(); tg.expand(); }

        let history = ['home'];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + id);
            if (page) page.classList.add('active');
        }

        function openPage(id) {
            history.push(id);
            showPage(id);
            if (tg?.BackButton) tg.BackButton.show();
        }

        function goBack() {
            if (history.length > 1) {
                history.pop();
                showPage(history[history.length - 1]);
            }
            if (history.length === 1 && tg?.BackButton) tg.BackButton.hide();
        }

        tg?.BackButton?.onClick(goBack);

        function openCatalog() {
            document.getElementById('catalog-widget').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }
        function closeCatalog() {
            document.getElementById('catalog-widget').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-container').classList.add('visible');
            }, 1500);
        });
    </script>
</body>
</html>
