<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --blue: #007aff;
}

* {
  box-sizing: border-box;
  user-select: none;              /* ❗ убрали выделение */
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  overflow: hidden;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background: linear-gradient(135deg,#6a11cb,#b16cea);
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 4px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
}

/* CONTENT */
.content {
  padding: 16px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  height: 120px;
  background: #b8e994;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 56px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(20px);
  border-radius: 100px;
  display: flex;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 100px;
  background: rgba(200,200,200,0.6);
  transition: transform 0.25s ease;
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: #888;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.nav-item svg {
  width: 18px;
  height: 18px;
  fill: #888;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  padding-bottom: 100px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>

  <div class="content">
    <h2>Каталог</h2>

    <div class="grid">
      <div class="card">1</div>
      <div class="card">2</div>
      <div class="card">3</div>
      <div class="card">4</div>
    </div>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page" style="display:none;">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div class="indicator" id="indicator"></div>

  <div class="nav-item active">
    <svg viewBox="0 0 24 24">
      <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>
    </svg>
    Каталог
  </div>

  <div class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
    </svg>
    Профиль
  </div>
</div>

<script>
const nav = document.getElementById("nav");
const indicator = document.getElementById("indicator");

const pages = [
  document.getElementById("home"),
  document.getElementById("profile")
];

let current = 0;
let startX = 0;
let dragging = false;
let startPos = 0;

function tabWidth() {
  return (nav.offsetWidth - 12) / 2; // учитываем padding
}

function getTranslateX() {
  const style = window.getComputedStyle(indicator);
  const matrix = new DOMMatrix(style.transform);
  return matrix.m41;
}

function setIndicator(x, scale = 1) {
  indicator.style.transform = `translateX(${x}px) scale(${scale})`;
}

function update() {
  let x = current * tabWidth();
  setIndicator(x, 1);

  pages[0].style.display = current === 0 ? "block" : "none";
  pages[1].style.display = current === 1 ? "block" : "none";

  document.querySelectorAll(".nav-item").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

update();

/* DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;

  // 🔥 берём РЕАЛЬНУЮ позицию — фикс телепорта
  startPos = getTranslateX();
});

nav.addEventListener("touchmove", e => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - startX;
  let pos = startPos + dx;

  let max = tabWidth();
  pos = Math.max(0, Math.min(max, pos));

  setIndicator(pos, 1.3);
  indicator.dataset.pos = pos;
});

nav.addEventListener("touchend", () => {
  dragging = false;

  let pos = parseFloat(indicator.dataset.pos || 0);

  current = pos > tabWidth() / 2 ? 1 : 0;

  update();
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el, i) => {
  el.onclick = () => {
    current = i;
    update();
  };
});
</script>

</body>
</html>
