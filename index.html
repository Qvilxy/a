<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pear Skate Clo.</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ===== ЭКРАН ЗАГРУЗКИ ===== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #loading-screen img {
            width: 180px;
            height: auto;
            animation: loadingPulse 1.5s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        #app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app-container.visible {
            display: flex;
        }

        /* ===== ШАПКА (HEADER) ===== */
        .header {
            position: relative;
            z-index: 10;
            background: #2b5ea7;
            padding-top: env(safe-area-inset-top, 0px);
        }

        /* Статус-бар iPhone */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 4px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .status-bar .time {
            font-size: 15px;
            font-weight: 700;
        }

        .status-bar .icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-bar .icons svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* Навигационная панель */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 12px;
            position: relative;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-close {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-close:active {
            background: rgba(255,255,255,0.25);
        }

        .btn-close .x-icon {
            font-size: 16px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-chevron {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .btn-dots {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* ===== ЛОГОТИП (выступает вниз) ===== */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -30%);
            z-index: 20;
            width: 100px;
            height: 100px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        /* ===== МЕНЮ-КНОПКИ ===== */
        .menu-bar {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 0 10px 10px;
            background: #2b5ea7;
            position: relative;
            z-index: 5;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .menu-item:active {
            background: rgba(255,255,255,0.1);
        }

        .menu-item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .menu-item span {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
        }

        /* Пространство для логотипа между кнопками */
        .menu-spacer {
            width: 110px;
            flex-shrink: 0;
        }

        /* ===== КОНТЕНТ ===== */
        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* Главная страница с баннером */
        .banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Страница "В разработке" */
        .dev-page {
            background: #f5f5f5;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .dev-page h2 {
            font-size: 22px;
            color: #333;
            font-weight: 600;
        }

        .dev-page p {
            color: #888;
            font-size: 15px;
        }

        .btn-back {
            background: #2b5ea7;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-back:active {
            background: #1e4a8a;
            transform: scale(0.97);
        }

        /* ===== ВИДЖЕТ КАТАЛОГА ===== */
        .catalog-widget {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.97);
            border-radius: 0 0 20px 20px;
            padding: 20px;
            text-align: center;
            z-index: 30;
            transform: translateY(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .catalog-widget.show {
            transform: translateY(0);
        }

        .catalog-widget p {
            font-size: 16px;
            color: #555;
            margin-bottom: 16px;
        }

        .catalog-widget .btn-close-widget {
            background: #2b5ea7;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 25;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen">
        <img src="assets/vetka.png" alt="Loading...">
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="app-container">

        <!-- ШАПКА -->
        <div class="header">
            <!-- Статус-бар -->
            <div class="status-bar">
                <span class="time" id="status-time">20:31</span>
                <div class="icons">
                    <!-- Сигнал -->
                    <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                    <!-- Wi-Fi -->
                    <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                    <!-- Батарея -->
                    <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
                </div>
            </div>

            <!-- Навигационная панель -->
            <div class="nav-bar">
                <div class="nav-left">
                    <button class="btn-close" id="btn-nav" onclick="handleNavClick()">
                        <span class="x-icon">✕</span>
                        <span id="nav-text">Закрыть</span>
                    </button>
                </div>

                <!-- ЛОГОТИП (выступает) -->
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Pear Skate Clo.">
                </div>

                <div class="nav-right">
                    <button class="btn-chevron">⌄</button>
                    <button class="btn-dots">•••</button>
                </div>
            </div>

            <!-- Меню -->
            <div class="menu-bar">
                <div class="menu-item" onclick="openCatalog()">
                    <img src="assets/korzina.png" alt="Каталог">
                    <span>Каталог</span>
                </div>
                <div class="menu-spacer"></div>
                <div class="menu-item" onclick="openPage('faq')">
                    <img src="assets/profile.png" alt="FAQ">
                    <span>F.A.Q.</span>
                </div>
            </div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content">
            <!-- Главная страница -->
            <div class="page active" id="page-home">
                <img src="assets/sadtree.png" class="banner" alt="Banner">
            </div>

            <!-- Страница Корзина -->
            <div class="page dev-page" id="page-korzina">
                <h2>🛒 Корзина</h2>
                <p>В разработке</p>
                <button class="btn-back" onclick="goBack()">Назад</button>
            </div>

            <!-- Страница Профиль -->
            <div class="page dev-page" id="page-profile">
                <h2>👤 Профиль</h2>
                <p>В разработке</p>
                <button class="btn-back" onclick="goBack()">Назад</button>
            </div>

            <!-- Страница FAQ -->
            <div class="page dev-page" id="page-faq">
                <h2>❓ F.A.Q.</h2>
                <p>В разработке</p>
                <button class="btn-back" onclick="goBack()">Назад</button>
            </div>
        </div>

        <!-- Виджет каталога -->
        <div class="catalog-widget" id="catalog-widget">
            <p>📦 Товаров ещё нет</p>
            <button class="btn-close-widget" onclick="closeCatalog()">Понятно</button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeCatalog()"></div>

    <script>
        // ===== ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // ===== ОБНОВЛЕНИЕ ВРЕМЕНИ =====
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('status-time').textContent = `${h}:${m}`;
        }
        updateTime();
        setInterval(updateTime, 10000);

        // ===== НАВИГАЦИЯ =====
        let history = ['home'];
        let currentPage = 'home';

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + pageId);
            if (page) {
                page.classList.add('active');
                currentPage = pageId;
            }

            // Меняем кнопку навигации
            const navText = document.getElementById('nav-text');
            const navIcon = document.querySelector('.x-icon');
            if (pageId === 'home') {
                navText.textContent = 'Закрыть';
                navIcon.textContent = '✕';
            } else {
                navText.textContent = 'Назад';
                navIcon.textContent = '←';
            }
        }

        function openPage(pageId) {
            history.push(pageId);
            showPage(pageId);
        }

        function goBack() {
            if (history.length > 1) {
                history.pop();
                const prevPage = history[history.length - 1];
                showPage(prevPage);
            }
        }

        function handleNavClick() {
            if (currentPage === 'home') {
                // Закрыть приложение
                if (tg) {
                    tg.close();
                }
            } else {
                goBack();
            }
        }

        // ===== КАТАЛОГ =====
        function openCatalog() {
            document.getElementById('catalog-widget').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }

        function closeCatalog() {
            document.getElementById('catalog-widget').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        // ===== ЭКРАН ЗАГРУЗКИ =====
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-container').classList.add('visible');
            }, 1500);
        });

        // Обработка свайпа назад на iOS
        if (tg) {
            tg.BackButton.onClick(() => {
                goBack();
            });
        }
    </script>
</body>
</html>
