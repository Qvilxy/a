<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pentagram Mini App</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            overflow: hidden; /* Убираем прокрутку */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, centerX, centerY, radius;
    let stars = [];
    let lines = [];
    let isAnimating = false;
    let animationFrameId;

    // Параметры
    const STAR_RADIUS = 10; 
    const PENTAGON_RADIUS_FACTOR = 0.35; 
    const LINE_WIDTH = 8; 
    const GLOW_BLUR = 15; 
    const GLOW_COLOR = 'white'; 
    const BOTTOM_STAR_OFFSET = 100; // Смещение нижней звезды вниз на 100px

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const logicalWidth = window.innerWidth;
        const logicalHeight = window.innerHeight;

        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);

        canvas.style.width = `${logicalWidth}px`;
        canvas.style.height = `${logicalHeight}px`;

        width = logicalWidth;
        height = logicalHeight;
        centerX = width / 2;
        
        // Немного поднимаем центр всей фигуры, чтобы компенсировать смещение нижней звезды вниз
        // и чтобы верхние звезды не ушли за экран
        centerY = height * 0.45; 
        
        radius = Math.min(width, height) * PENTAGON_RADIUS_FACTOR;
        
        calculateStarPositions();
        draw();
    }

    // Рассчитываем позиции звезд с учетом смещения нижней
    function calculateStarPositions() {
        stars = [];
        
        // Сначала рассчитываем позиции как для обычного перевернутого пятиугольника
        // чтобы сохранить пропорции между верхними звездами
        const tempStars = [];
        for (let i = 0; i < 5; i++) {
            // Угол для перевернутого пятиугольника (0 - внизу)
            const angle = (i * 2 * Math.PI / 5) + (Math.PI / 2);
            tempStars.push({
                x: centerX + radius * Math.cos(angle),
                y: centerY + radius * Math.sin(angle),
                index: i
            });
        }

        // Теперь применяем смещение к нижней звезде (индекс 0)
        // и пересчитываем остальные, чтобы они остались соединенными правильно?
        // Нет, в пентаграмме линии соединяют конкретные точки.
        // Если мы двигаем одну точку, линии просто будут длиннее. Это то, что нужно.
        
        stars = tempStars.map(star => {
            if (star.index === 0) {
                // Смещаем самую нижнюю звезду вниз на 100px
                return { ...star, y: star.y + BOTTOM_STAR_OFFSET };
            }
            return star;
        });
    }

    function drawStar(x, y) {
        ctx.save();
        ctx.shadowColor = GLOW_COLOR;
        ctx.shadowBlur = GLOW_BLUR;
        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.moveTo(x - STAR_RADIUS, y);
        ctx.lineTo(x + STAR_RADIUS, y);
        ctx.moveTo(x, y - STAR_RADIUS);
        ctx.lineTo(x, y + STAR_RADIUS);
        ctx.stroke();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Рисуем линии
        lines.forEach(line => {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
            ctx.restore();
        });

        // Рисуем анимируемую линию
        if (isAnimating && currentAnimationLine) {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(currentAnimationLine.startX, currentAnimationLine.startY);
            ctx.lineTo(currentAnimationLine.currentX, currentAnimationLine.currentY);
            ctx.stroke();
            ctx.restore();
        }

        // Рисуем звезды поверх линий
        stars.forEach(star => drawStar(star.x, star.y));
    }

    let currentAnimationLine = null;

    function animateLine(startPoint, endPoint, callback) {
        const duration = 500;
        const startTime = performance.now();

        currentAnimationLine = {
            startX: startPoint.x,
            startY: startPoint.y,
            endX: endPoint.x,
            endY: endPoint.y,
            currentX: startPoint.x,
            currentY: startPoint.y
        };

        function step(timestamp) {
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);

            currentAnimationLine.currentX = startPoint.x + (endPoint.x - startPoint.x) * progress;
            currentAnimationLine.currentY = startPoint.y + (endPoint.y - startPoint.y) * progress;

            draw();

            if (progress < 1) {
                animationFrameId = requestAnimationFrame(step);
            } else {
                currentAnimationLine = null;
                lines.push({
                    startX: startPoint.x,
                    startY: startPoint.y,
                    endX: endPoint.x,
                    endY: endPoint.y
                });
                draw();
                callback();
            }
        }
        animationFrameId = requestAnimationFrame(step);
    }

    // Порядок соединения для пентаграммы (0 - нижняя, 1 - правая нижняя, 2 - правая верхняя, 3 - левая верхняя, 4 - левая нижняя)
    // В нашем расчете углов:
    // 0: PI/2 (низ)
    // 1: PI/2 + 72deg (право-низ) -> нет, это зависит от направления.
    // Давайте проверим порядок индексов в calculateStarPositions:
    // i=0: angle = PI/2 (90 deg) -> Низ
    // i=1: angle = PI/2 + 2PI/5 (162 deg) -> Лево-Низ (в 3 четверти декартовой, но в canvas Y вниз, так что это Право-Низ? Нет.
    // Canvas: X вправо, Y вниз.
    // 0 deg: Право
    // 90 deg (PI/2): Низ
    // 180 deg (PI): Лево
    // 270 deg (3PI/2): Верх
    
    // i=0 (90 deg): Низ
    // i=1 (162 deg): Лево-Низ
    // i=2 (234 deg): Лево-Верх
    // i=3 (306 deg): Право-Верх
    // i=4 (378 deg = 18 deg): Право-Низ

    // Пентаграмма соединяет через одну вершину.
    // Порядок: 0 -> 2 -> 4 -> 1 -> 3 -> 0
    const CONNECTION_ORDER = [
        { from: 0, to: 2 }, // Низ -> Лево-Верх
        { from: 2, to: 4 }, // Лево-Верх -> Право-Низ
        { from: 4, to: 1 }, // Право-Низ -> Лево-Низ
        { from: 1, to: 3 }, // Лево-Низ -> Право-Верх
        { from: 3, to: 0 }  // Право-Верх -> Низ
    ];

    function startPentagramAnimation(startStarIndex) {
        if (isAnimating || lines.length > 0) return;

        isAnimating = true;
        lines = [];
        
        let startIndexInOrder = CONNECTION_ORDER.findIndex(conn => conn.from === startStarIndex);
        
        if (startIndexInOrder === -1) {
             startIndexInOrder = 0;
        }

        let currentStep = startIndexInOrder;

        function drawNextLine() {
            if (currentStep >= CONNECTION_ORDER.length) {
                isAnimating = false;
                return;
            }

            const connection = CONNECTION_ORDER[currentStep];
            const startPoint = stars[connection.from];
            const endPoint = stars[connection.to];

            animateLine(startPoint, endPoint, () => {
                currentStep++;
                drawNextLine();
            });
        }

        drawNextLine();
    }

    function handleInput(clientX, clientY) {
        for (let star of stars) {
            const dx = clientX - star.x;
            const dy = clientY - star.y;
            if (dx * dx + dy * dy < (STAR_RADIUS * 3) ** 2) {
                startPentagramAnimation(star.index);
                break;
            }
        }
    }

    canvas.addEventListener('click', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        e.preventDefault(); 
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('resize', resize);

    resize();

</script>

</body>
</html>
