<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rose Mini App</title>
  <style>
    /* === БАЗОВЫЕ СТИЛИ === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Блокируем скролл во время анимации */
      background-color: #000; /* Черный фон, как в оригинале */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* === ЭКРАН ЗАГРУЗКИ (SPLASH SCREEN) === */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
      transition: opacity 0.8s ease-out, visibility 0.8s;
      
      /* Запрещаем любые клики по экрану загрузки */
      pointer-events: none; 
      user-select: none;
    }

    /* Контейнер для розы */
    .rose-container {
      position: relative;
      width: 200px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    /* === РИСОВАНИЕ РОЗЫ ЧЕРЕЗ CSS/SVG === */
    
    /* Стебель */
    .stem {
      width: 4px;
      height: 0; /* Анимируем высоту */
      background: linear-gradient(to right, #2d5a27, #4caf50, #2d5a27);
      position: absolute;
      bottom: 0;
      border-radius: 2px;
      animation: growStem 2s ease-out forwards;
    }

    /* Листья */
    .leaf {
      position: absolute;
      width: 40px;
      height: 20px;
      background: linear-gradient(45deg, #2d5a27, #4caf50);
      border-radius: 0 50% 0 50%;
      opacity: 0;
      transform-origin: left center;
    }

    .leaf.left {
      bottom: 100px;
      left: 50%;
      transform: translateX(-100%) rotate(-45deg) scale(0);
      animation: growLeafLeft 1.5s ease-out 1.5s forwards;
    }

    .leaf.right {
      bottom: 140px;
      left: 50%;
      transform: rotate(45deg) scale(0);
      border-radius: 50% 0 50% 0;
      transform-origin: right center;
      animation: growLeafRight 1.5s ease-out 1.8s forwards;
    }

    /* Цветок (используем SVG для красоты лепестков) */
    .flower-head {
      position: absolute;
      top: 0; /* Будет позиционироваться относительно верха стебля */
      width: 120px;
      height: 120px;
      opacity: 0;
      transform: scale(0);
      /* Анимация появления цветка */
      animation: bloomFlower 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2s forwards;
    }

    /* SVG стили внутри розы */
    .petal {
      fill: #b30000;
      stroke: #800000;
      stroke-width: 1;
      transform-origin: center bottom;
    }
    
    /* Внутренние лепестки светлее */
    .petal.inner {
      fill: #ff0000;
      stroke: #cc0000;
    }

    /* === АНИМАЦИИ (KEYFRAMES) === */

    @keyframes growStem {
      0% { height: 0; }
      100% { height: 200px; }
    }

    @keyframes growLeafLeft {
      0% { transform: translateX(-100%) rotate(-45deg) scale(0); opacity: 0; }
      100% { transform: translateX(-100%) rotate(-45deg) scale(1); opacity: 1; }
    }

    @keyframes growLeafRight {
      0% { transform: rotate(45deg) scale(0); opacity: 0; }
      100% { transform: rotate(45deg) scale(1); opacity: 1; }
    }

    @keyframes bloomFlower {
      0% { 
        opacity: 0; 
        transform: scale(0) translateY(20px); 
      }
      60% {
        opacity: 1;
        transform: scale(1.1) translateY(-10px);
      }
      100% { 
        opacity: 1; 
        transform: scale(1) translateY(0); 
      }
    }

    /* Класс для скрытия экрана */
    .hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* === ОСНОВНОЙ КОНТЕНТ === */
    #app-content {
      display: none;
      min-height: 100vh;
      padding: 20px;
      color: var(--tg-theme-text-color, #fff);
      background-color: var(--tg-theme-bg-color, #1c1c1e);
      opacity: 0;
      transition: opacity 1s ease-in;
    }
    
    #app-content.visible {
      opacity: 1;
    }

    h1 { text-align: center; margin-top: 50px; color: #ff4d4d; }
    p { text-align: center; margin-top: 20px; line-height: 1.5; }

  </style>
</head>
<body>

  <!-- Экран загрузки с CSS-розой -->
  <div id="splash-screen">
    <div class="rose-container">
      <!-- Стебель -->
      <div class="stem"></div>
      
      <!-- Листья -->
      <div class="leaf left"></div>
      <div class="leaf right"></div>
      
      <!-- Голова цветка (SVG) -->
      <div class="flower-head">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Внешние лепестки -->
          <path class="petal" d="M50 90 C 20 90 10 60 20 40 C 30 20 50 10 50 10 C 50 10 70 20 80 40 C 90 60 80 90 50 90 Z" />
          <!-- Средние лепестки -->
          <path class="petal" d="M50 85 C 30 85 25 65 35 50 C 45 35 50 30 50 30 C 50 30 55 35 65 50 C 75 65 70 85 50 85 Z" style="fill: #cc0000;" />
          <!-- Внутренний бутон -->
          <path class="petal inner" d="M50 80 C 40 80 35 70 40 60 C 45 50 50 45 50 45 C 50 45 55 50 60 60 C 65 70 60 80 50 80 Z" />
          <circle cx="50" cy="55" r="5" fill="#ffcccc" opacity="0.6" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Основной контент -->
  <div id="app-content">
    <h1>🌹 Добро пожаловать!</h1>
    <p>Анимация загрузки завершена.</p>
    <p>Это полностью CSS-решение: быстрое, легкое и без кнопок паузы.</p>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const splashScreen = document.getElementById('splash-screen');
      const appContent = document.getElementById('app-content');

      // Таймер на 5 секунд (длительность всей анимации роста и цветения)
      setTimeout(() => {
        // 1. Скрываем заставку
        splashScreen.classList.add('hidden');

        // 2. Показываем контент
        appContent.style.display = 'block';
        
        // Небольшая задержка для плавного появления контента
        setTimeout(() => {
          appContent.classList.add('visible');
          document.body.style.overflow = 'auto'; // Разрешаем скролл
        }, 50);

      }, 5000); // 5000 мс = 5 секунд
    });
  </script>
</body>
</html>
