<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --blue: #007aff;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  overflow: hidden;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background: linear-gradient(135deg,#6a11cb,#b16cea);
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 4px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 68px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(20px);
  border-radius: 34px;
  display: flex;
  padding: 6px;
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 30px;
  background: rgba(200,200,200,0.6);
  transition: transform 0.3s ease;
}

/* при зажатии */
.dragging .indicator {
  transform: scale(1.3);
  background:
    linear-gradient(120deg, rgba(255,255,255,0.5), rgba(200,200,200,0.3));
}

/* ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #888;
  z-index: 2;
}

.nav-item.active {
  color: var(--blue);
}
</style>
</head>

<body>

<div id="home">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>
</div>

<div id="profile" style="display:none;">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>
</div>

<div class="nav" id="nav">
  <div class="indicator" id="indicator"></div>

  <div class="nav-item active">Каталог</div>
  <div class="nav-item">Профиль</div>
</div>

<script>
const nav = document.getElementById("nav");
const indicator = document.getElementById("indicator");
const pages = [home, profile];

let current = 0;
let startX = 0;
let dragging = false;

function tabWidth() {
  return nav.offsetWidth / 2;
}

function update() {
  let x = current * tabWidth();
  indicator.style.transform = `translateX(${x}px)`;

  pages[0].style.display = current === 0 ? "block" : "none";
  pages[1].style.display = current === 1 ? "block" : "none";

  document.querySelectorAll(".nav-item").forEach((el,i)=>{
    el.classList.toggle("active", i===current);
  });
}

update();

/* DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  nav.classList.add("dragging");
});

nav.addEventListener("touchmove", e => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - startX;
  let pos = current * tabWidth() + dx;

  pos = Math.max(0, Math.min(tabWidth(), pos));

  indicator.style.transform = `translateX(${pos}px)`;
  indicator.dataset.pos = pos;
});

nav.addEventListener("touchend", () => {
  dragging = false;
  nav.classList.remove("dragging");

  let pos = parseFloat(indicator.dataset.pos || 0);

  current = pos > tabWidth()/2 ? 1 : 0;

  update();
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el,i)=>{
  el.onclick = ()=>{
    current = i;
    update();
  };
});
</script>

</body>
</html>
