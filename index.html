<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: #f5f5f7;
  --blue: #007aff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  overflow: hidden;
}

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.6s ease;
}

#splash img {
  width: 120px;
  height: 120px;
}

/* APP */
#app {
  display: none;
  height: 100vh;
  padding-top: env(safe-area-inset-top);
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  overflow: hidden;
}

.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(270deg, #6a11cb, #b16cea, #8e54e9, #6a11cb);
  background-size: 400% 400%;
  animation: gradientFlow 8s ease infinite;
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(20px);
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 11px); /* было 7px → стало 11px */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  z-index: 2;
}

/* CONTENT */
.content {
  padding: 16px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 68px; /* +8px */
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.4);
  border-radius: 34px;
  display: flex;
  align-items: center;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  background: rgba(200,200,200,0.6);
  border-radius: 30px;
  transition: transform 0.35s cubic-bezier(.22,1,.36,1), 
              scale 0.25s cubic-bezier(.22,1,.36,1);
}

/* liquid press */
.dragging .indicator {
  scale: 1.3;
  transition: none;
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: #888;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: #888;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}
</style>
</head>

<body>

<div id="splash">
  <img src="logoredbox.png" />
</div>

<div id="app">

  <div id="home" class="page">
    <div class="header">
      <img src="logoredbox.png" class="logo">
    </div>
  </div>

  <div id="profile" class="page"></div>

  <div class="nav" id="nav">
    <div class="indicator" id="indicator"></div>

    <div class="nav-item active">
      <!-- 🌹 БУКЕТ РОЗ -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2c1 2 2 3 3 4 2-1 3-1 5 0-1 2-2 3-4 4 2 1 3 2 4 4-2 1-3 2-5 3-2-1-3-2-5-3 1-2 2-3 4-4-2-1-3-2-4-4 2-1 3-1 5 0 1-1 2-2 3-4zM9 18l3 4 3-4z"/>
      </svg>
      Главная
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
      </svg>
      Профиль
    </div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const splash = document.getElementById("splash");
const app = document.getElementById("app");

setTimeout(() => {
  splash.style.opacity = 0;
  setTimeout(() => {
    splash.style.display = "none";
    app.style.display = "block";
  }, 600);
}, 1200);

let current = 0;
let dragPosition = 0;

const indicator = document.getElementById("indicator");
const nav = document.getElementById("nav");

function getTabWidth() {
  return nav.offsetWidth / 2;
}

function updateUI() {
  indicator.style.transform = `translateX(${current * getTabWidth()}px)`;

  document.querySelectorAll(".nav-item").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

updateUI();

/* DRAG */
let startX = 0;
let dragging = false;

nav.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  dragging = true;
  dragPosition = current * getTabWidth();
  nav.classList.add("dragging");
});

nav.addEventListener("touchmove", (e) => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - startX;
  let pos = dragPosition + dx;

  let max = getTabWidth();
  pos = Math.max(0, Math.min(max, pos));

  indicator.style.transform = `translateX(${pos}px)`;

  // сохраняем позицию
  indicator.dataset.pos = pos;
});

nav.addEventListener("touchend", () => {
  dragging = false;
  nav.classList.remove("dragging");

  let pos = parseFloat(indicator.dataset.pos || 0);
  let tabWidth = getTabWidth();

  // 💡 выбираем ближайшую вкладку
  current = pos > tabWidth / 2 ? 1 : 0;

  updateUI();
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el, i) => {
  el.onclick = () => {
    current = i;
    updateUI();
  };
});
</script>

</body>
</html>
