<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pear Skate Clo.</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a2e;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #loading-screen img {
            max-width: 60%;
            max-height: 40%;
            object-fit: contain;
        }

        /* ===== ГЛАВНАЯ СТРАНИЦА ===== */
        #main-page {
            display: none;
            min-height: 100vh;
            background: #1a1a2e;
        }

        /* ===== ШАПКА ===== */
        .header {
            position: relative;
            background-color: #245484;
            padding-bottom: 10px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            padding-bottom: 18px;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .header-icon:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .header-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* Логотип перекрывает границу шапки и кнопок */
        .logo-container {
            position: absolute;
            bottom: -44px;
            left: 50%;
            transform: translateX(-50%);
            width: 92px;
            height: 92px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ===== КНОПКИ НАВИГАЦИИ ===== */
        .nav-buttons {
            display: flex;
            background: #111111;
            padding-top: 48px;
        }

        .nav-btn {
            flex: 1;
            padding: 5px 0 6px 0;
            text-align: center;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            background: none;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .nav-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-btn.catalog-btn {
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ===== ВИДЖЕТ КАТАЛОГА ===== */
        #catalog-widget {
            display: none;
            background: #2a2a3e;
            padding: 16px;
            text-align: center;
            color: #cccccc;
            font-size: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== БАННЕР ===== */
        .banner {
            width: 100%;
            height: calc(100vh - 144px);
            min-height: 400px;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== СТРАНИЦА "В РАЗРАБОТКЕ" ===== */
        #dev-page {
            display: none;
            min-height: 100vh;
            background: #ffffff;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #dev-page .dev-text {
            font-size: 22px;
            color: #333333;
            font-weight: 500;
            user-select: none;
            transition: opacity 0.2s;
        }

        #dev-page .dev-text:active {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div id="loading-screen">
        <img src="vetka.png" alt="Ветка с грушей" id="loading-image">
    </div>

    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="main-page">
        
        <!-- Шапка -->
        <div class="header" id="header">
            <div class="header-top">
                <div class="header-icon" id="btn-cart" onclick="openDevPage()">
                    <img src="korzina.png" alt="Корзина">
                </div>
                <div class="header-icon" id="btn-profile" onclick="openDevPage()">
                    <img src="profile.png" alt="Профиль">
                </div>
            </div>
            <div class="logo-container" onclick="goHome()">
                <img src="logo.png" alt="Pear Skate Clo.">
            </div>
        </div>

        <!-- Кнопки навигации -->
        <div class="nav-buttons">
            <button class="nav-btn catalog-btn" id="btn-catalog" onclick="toggleCatalog()">Каталог</button>
            <button class="nav-btn" id="btn-faq" onclick="openDevPage()">F.A.Q.</button>
        </div>

        <!-- Виджет каталога -->
        <div id="catalog-widget">
