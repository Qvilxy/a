<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Loading Screen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #87CEEB, #E0F7FA); /* голубое небо */
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sky {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .cloud {
      position: absolute;
      opacity: 0.8;
      animation: floatCloud 8s infinite ease-in-out alternate;
    }

    .cloud1 { top: 10%; left: 10%; width: 150px; }
    .cloud2 { top: 30%; right: 15%; width: 120px; animation-delay: 1s; }
    .cloud3 { bottom: 20%; left: 20%; width: 180px; animation-delay: 2s; }

    .bear {
      position: relative;
      width: 200px;
      z-index: 10;
      animation: wavePaw 0.3s infinite alternate;
    }

    .heart {
      position: absolute;
      width: 60px;
      animation: floatHeart 2s infinite ease-in-out alternate;
    }

    .heart1 { top: 15%; left: 20%; animation-delay: 0s; }
    .heart2 { top: 25%; right: 25%; animation-delay: 0.3s; }
    .heart3 { bottom: 30%; left: 15%; animation-delay: 0.6s; }
    .heart4 { bottom: 20%; right: 20%; animation-delay: 0.9s; }
    .heart5 { top: 40%; left: 10%; animation-delay: 1.2s; }
    .heart6 { top: 50%; right: 10%; animation-delay: 1.5s; }

    @keyframes floatCloud {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }

    @keyframes wavePaw {
      0% { transform: rotate(-15deg); }
      100% { transform: rotate(15deg); }
    }

    @keyframes floatHeart {
      0% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-15px) translateX(5px); }
      100% { transform: translateY(0) translateX(0); }
    }

    #app-interface {
      display: none;
      padding: 2rem;
      text-align: center;
      background: white;
      min-height: 100vh;
    }
  </style>
</head>
<body>

  <!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
  <div id="loading-screen">
    <div class="sky"></div>

    <!-- Облака -->
    <img src="assets/cloud.png" class="cloud cloud1" alt="Облако">
    <img src="assets/cloud.png" class="cloud cloud2" alt="Облако">
    <img src="assets/cloud.png" class="cloud cloud3" alt="Облако">

    <!-- Медведь -->
    <img src="assets/bear.png" class="bear" alt="Медведь">

    <!-- Сердца -->
    <img src="assets/heart.png" class="heart heart1" alt="Сердце">
    <img src="assets/heart.png" class="heart heart2" alt="Сердце">
    <img src="assets/heart.png" class="heart heart3" alt="Сердце">
    <img src="assets/heart.png" class="heart heart4" alt="Сердце">
    <img src="assets/heart.png" class="heart heart5" alt="Сердце">
    <img src="assets/heart.png" class="heart heart6" alt="Сердце">
  </div>

  <!-- ОСНОВНОЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
  <div id="app-interface">
    <h1>Добро пожаловать!</h1>
    <p>Интерфейс приложения запущен.</p>
    <button onclick="alert('Работает!')">Нажми меня</button>
  </div>

  <script>
    // Ждём 3 секунды → резко переключаемся на интерфейс
    setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app-interface').style.display = 'block';
    }, 3000);
  </script>

</body>
</html>
