<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: #f5f5f7;
  --blue: #007aff;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  overflow: hidden;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  overflow: hidden;
}

.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(270deg,#6a11cb,#b16cea,#8e54e9,#6a11cb);
  background-size: 400% 400%;
  animation: gradient 8s ease infinite;
}

@keyframes gradient {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 4px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
}

/* CONTENT */
.content {
  padding: 16px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 68px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.4);
  border-radius: 34px;
  display: flex;
  align-items: center;
  padding: 6px;
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 30px;
  background: rgba(200,200,200,0.6);
  transition: transform 0.35s cubic-bezier(.22,1,.36,1);
}

/* LIQUID MODE */
.dragging .indicator {
  transform: scale(1.3); /* строго 1.3 */
  backdrop-filter: blur(30px);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(0,122,255,0.2), transparent 70%),
    rgba(255,255,255,0.25);

  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.8),
    inset 0 0 30px rgba(255,255,255,0.4),
    0 8px 25px rgba(0,0,0,0.15);
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: #888;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: #888;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  padding-bottom: 100px;
}

#profile {
  display: none;
}
</style>
</head>

<body>

<div id="home" class="page">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>

  <div class="content">
    <h2>Каталог</h2>
  </div>
</div>

<div id="profile" class="page">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>
</div>

<div class="nav" id="nav">
  <div class="indicator" id="indicator"></div>

  <div class="nav-item active">
    <svg viewBox="0 0 24 24">
      <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>
    </svg>
    Каталог
  </div>

  <div class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
    </svg>
    Профиль
  </div>
</div>

<script>
const nav = document.getElementById("nav");
const indicator = document.getElementById("indicator");
const pages = [document.getElementById("home"), document.getElementById("profile")];

let current = 0;
let startX = 0;
let dragging = false;

function tabWidth() {
  return nav.offsetWidth / 2;
}

function update() {
  let x = current * tabWidth();
  indicator.style.transform = `translateX(${x}px)`;

  pages[0].style.display = current === 0 ? "block" : "none";
  pages[1].style.display = current === 1 ? "block" : "none";

  document.querySelectorAll(".nav-item").forEach((el,i)=>{
    el.classList.toggle("active", i===current);
  });
}

update();

/* DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  nav.classList.add("dragging");
});

nav.addEventListener("touchmove", e => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - startX;
  let pos = current * tabWidth() + dx;

  pos = Math.max(0, Math.min(tabWidth(), pos));

  indicator.style.transform = `translateX(${pos}px)`;
  indicator.dataset.pos = pos;
});

nav.addEventListener("touchend", () => {
  dragging = false;
  nav.classList.remove("dragging");

  let pos = parseFloat(indicator.dataset.pos || 0);

  current = pos > tabWidth()/2 ? 1 : 0;

  update();
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el,i)=>{
  el.onclick = ()=>{
    current = i;
    update();
  };
});
</script>

</body>
</html>
