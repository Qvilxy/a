<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg-color: #ffffff;       /* Белый фон приложения */
  --banner-bg: #f2f2f7;      /* Светло-серый фон баннеров */
  --surface-color: #ffffff;  /* Белые карточки */
  --text-primary: #000000;
  --text-secondary: #8e8e93;
  --accent-color: #007aff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-primary);
  -webkit-user-select: none;
  user-select: none;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  height: 100vh;
  width: 100vw;
}

/* SPLASH SCREEN */
#splash-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--bg-color);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease-out, visibility 0.5s;
}

#splash-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.splash-logo {
  width: 80px;
  animation: pulseLogo 2s infinite ease-in-out;
}

@keyframes pulseLogo {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.8; }
}

/* LAYOUT WRAPPER */
.page-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* FIXED TOP AREA - Фиксируется сверху при скролле */
.fixed-top-area {
  flex-shrink: 0;
  background: var(--bg-color);
  z-index: 100; /* Высокий z-index, чтобы перекрывать контент при скролле */
  position: sticky; /* Ключевое свойство для фиксации */
  top: 0;
  width: 100%;
  padding-bottom: 10px; /* Отступ от поиска до контента */
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  overflow: hidden;
  border-bottom-left-radius: 24px;
  border-bottom-right-radius: 24px;
  background: var(--bg-color);
  box-shadow: none; 
  border-bottom: none;
}

.logo {
  position: absolute;
  top: calc(50% + 7px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
  pointer-events: none;
  -webkit-user-drag: none;
  z-index: 3;
}

/* SEARCH BAR - ТАБЛЕТКА С ТЕНЬЮ */
.search-bar {
  margin: 0 16px;
  background: var(--surface-color);
  border: none; /* УБРАН КОНТУР */
  border-radius: 100px;
  padding: 0 20px;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  /* ТЕНЬ ВОКРУГ ТАБЛЕТКИ */
  box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
  transition: box-shadow 0.2s ease;
}

.search-bar svg {
  width: 20px;
  height: 20px;
  fill: var(--text-secondary);
  flex-shrink: 0;
  pointer-events: none;
}

.search-bar input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 17px;
  color: var(--text-primary);
  width: 100%;
  font-family: inherit;
  -webkit-user-select: text;
  user-select: text;
}

.search-bar input::placeholder {
  color: var(--text-secondary);
}

/* SCROLLABLE CONTENT AREA */
.page-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 40px;
  width: 100%;
  touch-action: pan-y;
  /* Важно: фон контента белый, но секции будут серыми */
  background: var(--bg-color);
}

/* COLLECTION SECTIONS - Серые баннеры */
.catalog-section {
  margin: 0 0 20px 0;
  background: var(--banner-bg); /* СЕРЫЙ ФОН */
  padding: 20px 0;
  width: 100%;
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  margin: 0 0 16px 0;
  text-align: center;
  letter-spacing: -0.5px;
  pointer-events: none;
  text-transform: uppercase;
}

/* FEATURED PRODUCT */
.featured-product {
  margin: 0 16px 16px 16px;
  background: var(--surface-color);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  /* Легкая рамка для белого на сером */
  border: 1px solid rgba(0,0,0,0.05); 
}

.featured-photo {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background-color 0.3s ease;
  touch-action: pan-y;
}

.featured-photo[data-state="0"] { background: linear-gradient(45deg, #e0f7fa, #b2ebf2); }
.featured-photo[data-state="1"] { background: linear-gradient(45deg, #fce4ec, #f8bbd0); }
.featured-photo[data-state="2"] { background: linear-gradient(45deg, #e8eaf6, #c5cae9); }

.featured-photo .dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  pointer-events: auto;
  background: rgba(255,255,255,0.6);
  padding: 4px 8px;
  border-radius: 12px;
  backdrop-filter: blur(4px);
}

.featured-photo .dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  cursor: pointer;
  transition: all 0.2s ease;
}

.featured-photo .dots span.active {
  background: #000;
  transform: scale(1.2);
}

.featured-info {
  padding: 14px 16px 16px 16px;
  pointer-events: none;
}

.featured-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 4px 0;
}

.featured-price {
  font-size: 15px;
  color: var(--accent-color);
  margin: 0;
  font-weight: 600;
}

/* PRODUCT SLIDER */
.product-slider {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 0 16px 8px 16px;
  touch-action: pan-y;
  -ms-overflow-style: none;
}

.product-slider::-webkit-scrollbar {
  display: none;
}

.product-card {
  flex: 0 0 calc(50% - 6px);
  background: var(--surface-color);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(0,0,0,0.05);
}

.product-photo {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background-color 0.3s ease;
  touch-action: pan-y; 
}

.product-photo[data-state="0"] { background: linear-gradient(45deg, #e0f7fa, #b2ebf2); }
.product-photo[data-state="1"] { background: linear-gradient(45deg, #fce4ec, #f8bbd0); }
.product-photo[data-state="2"] { background: linear-gradient(45deg, #e8eaf6, #c5cae9); }

.product-photo .dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  pointer-events: auto;
  background: rgba(255,255,255,0.6);
  padding: 3px 6px;
  border-radius: 10px;
  backdrop-filter: blur(2px);
}

.product-photo .dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;

  cursor: pointer;
  transition: all 0.2s ease;
}

.product-photo .dots span.active {
  background: #000;
  transform: scale(1.2);
}

.product-info {
  padding: 10px 12px 12px 12px;
  pointer-events: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  -webkit-user-select: none;

}

.product-name {
  font-size: 14px;

  color: var(--text-primary);
  margin: 0 0 4px 0;
  line-height: 1.2;
}

.product-price {
  font-size: 14px;

  margin: 0;
  font-weight: 600;
}

/* SCROLL INDICATOR */
.scroll-indicator {
  height: 4px;
  background: rgba(0,0,0,0.1);
  border-radius: 100px;
  margin: 12px 20px 0 20px;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

.scroll-indicator-thumb {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: #000;
  border-radius: 100px;
  transition: left 0.1s ease-out;
  box-shadow: 0 0 4px rgba(0,0,0,0.2);
  will-change: left, width;
  cursor: grab;
  touch-action: none;
}

.scroll-indicator-thumb:active {
  cursor: grabbing;
  background: #333;
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  display: none;
}

.page.active-page {
  display: flex;
}

</style>
</head>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

if (tg.setHeaderColor) {
    tg.setHeaderColor('#ffffff');
    tg.setBackgroundColor('#ffffff');
}

if (tg.disableVerticalSwipes) {
    tg.disableVerticalSwipes();
}

// ЛОГИКА ЭКРАНА ЗАГРУЗКИ
window.addEventListener('load', () => {
  const splash = document.getElementById('splash-screen');
  setTimeout(() => {
    splash.classList.add('hidden');
  }, 1500);
});

const body = document.body;
const pages = [
  document.getElementById("home"),
  document.getElementById("profile")
];

let current = 0;

function updatePages() {
  pages.forEach((p, i) => {
      if (i === current) {
          p.classList.add('active-page');
          p.style.display = 'flex';
      } else {
          p.classList.remove('active-page');
          p.style.display = 'none';
      }
  });
}

updatePages();

/* PRODUCT SLIDER WITH IMPROVED DRAGGABLE THUMB */
function initSlider(sliderId, thumbId) {
  const slider = document.getElementById(sliderId);
  const thumb = document.getElementById(thumbId);
  if (!slider || !thumb) return;

  let isDraggingThumb = false;
  let startX = 0;
  let startScrollLeft = 0;

  function updateThumb() {
    const products = slider.querySelectorAll('.product-card');
    const totalProducts = products.length;
    if (totalProducts === 0) return;

    const visibleWidth = slider.clientWidth;
    const scrollWidth = slider.scrollWidth;
    const maxScroll = scrollWidth - visibleWidth;
    
    if (maxScroll <= 0) {
        thumb.style.display = 'none';
        return;
    } else {
        thumb.style.display = 'block';
    }

    const thumbWidthPercent = (visibleWidth / scrollWidth) * 100;
    const scrollLeft = slider.scrollLeft;
    const thumbLeftPercent = (scrollLeft / maxScroll) * (100 - thumbWidthPercent);
    
    thumb.style.width = thumbWidthPercent + '%';
    thumb.style.left = thumbLeftPercent + '%';
  }

  function onThumbStart(e) {
    isDraggingThumb = true;
    startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    startScrollLeft = slider.scrollLeft;
    thumb.style.transition = 'none';
    e.stopPropagation(); 
  }

  function onThumbMove(e) {
    if (!isDraggingThumb) return;
    e.preventDefault(); 
    
    const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    const deltaX = currentX - startX;
    
    const indicatorContainer = thumb.parentElement;
    const containerWidth = indicatorContainer.offsetWidth;
    const thumbWidth = thumb.offsetWidth;
    const availableThumbMovePx = containerWidth - thumbWidth;
    
    if (availableThumbMovePx <= 0) return;

    const maxScroll = slider.scrollWidth - slider.clientWidth;
    const scrollDelta = deltaX * (maxScroll / availableThumbMovePx);
    
    slider.scrollLeft = startScrollLeft + scrollDelta;
  }

  function onThumbEnd() {
    if (isDraggingThumb) {
      isDraggingThumb = false;
      thumb.style.transition = 'left 0.1s ease-out';
    }
  }

  thumb.addEventListener('touchstart', onThumbStart, { passive: false });
  thumb.addEventListener('mousedown', onThumbStart);

  window.addEventListener('touchmove', onThumbMove, { passive: false });
  window.addEventListener('mousemove', onThumbMove);
  
  window.addEventListener('touchend', onThumbEnd);
  window.addEventListener('mouseup', onThumbEnd);

  slider.addEventListener("scroll", updateThumb, { passive: true });
  
  setTimeout(updateThumb, 100);
  window.addEventListener("resize", updateThumb);

  let isDraggingInfo = false;
  let infoStartX = 0;
  let infoStartScroll = 0;

  slider.addEventListener('touchstart', (e) => {
    if (e.target.closest('.product-info')) {
      isDraggingInfo = true;
      infoStartX = e.touches[0].clientX;
      infoStartScroll = slider.scrollLeft;
      slider.style.scrollBehavior = 'auto';
    }
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!isDraggingInfo) return;
    
    const currentX = e.touches[0].clientX;
    const diff = infoStartX - currentX;
    
    if (Math.abs(diff) > 2) {
       e.preventDefault();
       slider.scrollLeft = infoStartScroll + diff;
    }
  }, { passive: false });

  window.addEventListener('touchend', () => {
    isDraggingInfo = false;
    slider.style.scrollBehavior = '';
  });
}

initSlider('slider1', 'thumb1');
initSlider('slider2', 'thumb2');

/* PHOTO SWIPE LOGIC & DOT CLICK */
function initPhotoInteractions(containerSelector, photoSelector, dotsSelector) {
  document.querySelectorAll(containerSelector).forEach(card => {
    const photo = card.querySelector(photoSelector);
    const dots = Array.from(card.querySelectorAll(dotsSelector));
    const totalStates = dots.length;
    
    dots.forEach((dot, idx) => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        setActiveState(idx);
      });
    });

    function setActiveState(idx) {
        dots.forEach(d => d.classList.remove('active'));
        dots[idx].classList.add('active');
        photo.dataset.state = idx;
    }

    let touchStartX = 0;
    let touchEndX = 0;
    let currentState = 0;

    photo.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    photo.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        const threshold = 30;
        const diff = touchStartX - touchEndX;

        currentState = parseInt(photo.dataset.state) || 0;

        if (Math.abs(diff) > threshold) {
            if (diff > 0) {
                let next = currentState + 1;
                if (next >= totalStates) next = 0;
                setActiveState(next);
            } else {
                let prev = currentState - 1;
                if (prev < 0) prev = totalStates - 1;
                setActiveState(prev);
            }
        }
    }
  });
}

initPhotoInteractions('.featured-product', '.featured-photo', '.featured-photo .dots span');
initPhotoInteractions('.product-card', '.product-photo', '.product-photo .dots span');

let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

</script>
