<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pentagram Mini App</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            overflow: hidden; /* Убираем прокрутку */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, centerX, centerY, radius;
    let stars = [];
    let lines = [];
    let isAnimating = false;
    let animationFrameId;

    // Параметры
    const DIAMOND_SIZE = 6; // Размер маленького ромба (половина диагонали)
    const PENTAGON_RADIUS_FACTOR = 0.35; 
    const LINE_WIDTH = 8; 
    const GLOW_BLUR = 15; 
    const GLOW_COLOR = 'white'; 
    const BOTTOM_STAR_OFFSET = 100; // Смещение нижней звезды вниз на 100px

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const logicalWidth = window.innerWidth;
        const logicalHeight = window.innerHeight;

        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);

        canvas.style.width = `${logicalWidth}px`;
        canvas.style.height = `${logicalHeight}px`;

        width = logicalWidth;
        height = logicalHeight;
        centerX = width / 2;
        
        // Немного поднимаем центр всей фигуры, чтобы компенсировать смещение нижней звезды вниз
        centerY = height * 0.45; 
        
        radius = Math.min(width, height) * PENTAGON_RADIUS_FACTOR;
        
        calculateStarPositions();
        draw();
    }

    // Рассчитываем позиции звезд с учетом смещения нижней
    function calculateStarPositions() {
        stars = [];
        
        // Сначала рассчитываем позиции как для обычного перевернутого пятиугольника
        const tempStars = [];
        for (let i = 0; i < 5; i++) {
            // Угол для перевернутого пятиугольника (0 - внизу)
            const angle = (i * 2 * Math.PI / 5) + (Math.PI / 2);
            tempStars.push({
                x: centerX + radius * Math.cos(angle),
                y: centerY + radius * Math.sin(angle),
                index: i
            });
        }

        // Применяем смещение к нижней звезде (индекс 0)
        stars = tempStars.map(star => {
            if (star.index === 0) {
                return { ...star, y: star.y + BOTTOM_STAR_OFFSET };
            }
            return star;
        });
    }

    // Функция для рисования маленького ромба со свечением
    function drawDiamond(x, y) {
        ctx.save();
        ctx.shadowColor = GLOW_COLOR;
        ctx.shadowBlur = GLOW_BLUR;
        ctx.fillStyle = 'white';
        
        ctx.beginPath();
        // Рисуем маленький ромб
        ctx.moveTo(x, y - DIAMOND_SIZE);     // Верх
        ctx.lineTo(x + DIAMOND_SIZE, y);     // Право
        ctx.lineTo(x, y + DIAMOND_SIZE);     // Низ
        ctx.lineTo(x - DIAMOND_SIZE, y);     // Лево
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Рисуем линии
        lines.forEach(line => {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
            ctx.restore();
        });

        // Рисуем анимируемую линию
        if (isAnimating && currentAnimationLine) {
            ctx.save();
            ctx.shadowColor = GLOW_COLOR;
            ctx.shadowBlur = GLOW_BLUR;
            ctx.beginPath();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = LINE_WIDTH;
            ctx.lineCap = 'round';
            ctx.moveTo(currentAnimationLine.startX, currentAnimationLine.startY);
            ctx.lineTo(currentAnimationLine.currentX, currentAnimationLine.currentY);
            ctx.stroke();
            ctx.restore();
        }

        // Рисуем маленькие ромбы поверх линий
        stars.forEach(star => drawDiamond(star.x, star.y));
    }

    let currentAnimationLine = null;

    function animateLine(startPoint, endPoint, callback) {
        const duration = 500;
        const startTime = performance.now();

        currentAnimationLine = {
            startX: startPoint.x,
            startY: startPoint.y,
            endX: endPoint.x,
            endY: endPoint.y,
            currentX: startPoint.x,
            currentY: startPoint.y
        };

        function step(timestamp) {
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);

            currentAnimationLine.currentX = startPoint.x + (endPoint.x - startPoint.x) * progress;
            currentAnimationLine.currentY = startPoint.y + (endPoint.y - startPoint.y) * progress;

            draw();

            if (progress < 1) {
                animationFrameId = requestAnimationFrame(step);
            } else {
                currentAnimationLine = null;
                lines.push({
                    startX: startPoint.x,
                    startY: startPoint.y,
                    endX: endPoint.x,
                    endY: endPoint.y
                });
                draw();
                callback();
            }
        }
        animationFrameId = requestAnimationFrame(step);
    }

    // Порядок соединения для пентаграммы
    // Индексы: 0(низ), 1(лево-низ), 2(лево-верх), 3(право-верх), 4(право-низ)
    const CONNECTION_ORDER = [
        { from: 0, to: 2 }, // Низ -> Лево-Верх
        { from: 2, to: 4 }, // Лево-Верх -> Право-Низ
        { from: 4, to: 1 }, // Право-Низ -> Лево-Низ
        { from: 1, to: 3 }, // Лево-Низ -> Право-Верх
        { from: 3, to: 0 }  // Право-Верх -> Низ
    ];

    function startPentagramAnimation(startStarIndex) {
        // Если анимация уже идет или рисунок уже готов, ничего не делаем
        if (isAnimating || lines.length > 0) return;

        isAnimating = true;
        lines = []; // Очищаем старые линии
        
        // НАЙДЕН ИНДЕКС СОЕДИНЕНИЯ, КОТОРОЕ НАЧИНАЕТСЯ С НАЖАТОЙ ЗВЕЗДЫ
        let startIndexInOrder = CONNECTION_ORDER.findIndex(conn => conn.from === startStarIndex);
        
        // Если вдруг не нашли (что маловероятно в замкнутом цикле), начинаем с начала
        if (startIndexInOrder === -1) {
             startIndexInOrder = 0;
        }

        let stepsDrawn = 0; // Счетчик нарисованных линий
        let currentStep = startIndexInOrder;

        function drawNextLine() {
            // ВАЖНОЕ ИЗМЕНЕНИЕ: Проверяем, нарисовали ли мы все 5 линий
            if (stepsDrawn >= 5) {
                isAnimating = false;
                return;
            }

            // Используем оператор остатка %, чтобы индекс зацикливался (0,1,2,3,4,0,1...)
            const connection = CONNECTION_ORDER[currentStep % CONNECTION_ORDER.length];
            
            const startPoint = stars[connection.from];
            const endPoint = stars[connection.to];

            animateLine(startPoint, endPoint, () => {
                stepsDrawn++;       // Увеличиваем счетчик нарисованных линий
                currentStep++;      // Переходим к следующему индексу в массиве
                drawNextLine();     // Рекурсивно вызываем для следующей линии
            });
        }

        drawNextLine();
    }

    function handleInput(clientX, clientY) {
        for (let star of stars) {
            const dx = clientX - star.x;
            const dy = clientY - star.y;
            // Увеличиваем область нажатия для удобства (радиус кликабельной зоны)
            if (dx * dx + dy * dy < (DIAMOND_SIZE * 4) ** 2) {
                startPentagramAnimation(star.index);
                break;
            }
        }
    }

    canvas.addEventListener('click', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        e.preventDefault(); 
        const touch = e.touches[0];
        handleInput(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('resize', resize);

    resize();

</script>

</body>
</html>
