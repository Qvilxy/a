<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Мое Мини-Приложение</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Экран загрузки с видео -->
  <div id="splash-screen">
    <video id="loading-video" autoplay muted playsinline loop>
      <source src="rose-loading.mp4" type="video/mp4">
      Ваш браузер не поддерживает видео.
    </video>
  </div>

  <!-- Основной контент приложения -->
  <div id="app-content">
    <header>
      <h1>🌹 Добро пожаловать!</h1>
    </header>
    <main>
      <p>Здесь находится основной интерфейс вашего мини-приложения.</p>
      <p>Анимация загрузки завершена.</p>
      <!-- Добавьте сюда свои элементы: кнопки, списки, формы и т.д. -->
    </main>
  </div>

  <!-- Подключаем Telegram WebApp API -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Подключаем наш скрипт -->
  <script src="app.js"></script>
</body>
</html>
