<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: #f5f5f7;
  --blue: #007aff;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  overflow: hidden;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  overflow: hidden;
}

.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(270deg, #6a11cb, #b16cea, #8e54e9, #6a11cb);
  background-size: 400% 400%;
  animation: gradientFlow 8s ease infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 4px); /* только 4px вниз */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
}

/* CONTENT */
.content {
  padding: 16px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  height: 120px;
  background: #b8e994;
  border-radius: 14px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 68px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.4);
  border-radius: 34px;
  display: flex;
  align-items: center;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  overflow: visible; /* разрешаем вылазить */
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 30px;
  background: rgba(200,200,200,0.6);
  transition: transform 0.35s cubic-bezier(.22,1,.36,1);
}

/* LIQUID GLASS ACTIVE */
.dragging .indicator {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.25);
  box-shadow:
    inset 0 0 10px rgba(255,255,255,0.6),
    0 0 20px rgba(0,122,255,0.2);
  transform: scale(1.15);
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: #888;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: #888;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}
</style>
</head>

<body>

<div id="app">

  <div id="home">
    <div class="header">
      <img src="logoredbox.png" class="logo">
    </div>

    <div class="content">
      <h2>Каталог</h2>

      <div class="grid">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
      </div>
    </div>
  </div>

  <div class="nav" id="nav">
    <div class="indicator" id="indicator"></div>

    <div class="nav-item active">
      <!-- КАТАЛОГ ИКОНКА -->
      <svg viewBox="0 0 24 24">
        <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>
      </svg>
      Каталог
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
      </svg>
      Профиль
    </div>
  </div>

</div>

<script>
let current = 0;
let startX = 0;
let dragging = false;

const indicator = document.getElementById("indicator");
const nav = document.getElementById("nav");

function tabWidth() {
  return nav.offsetWidth / 2;
}

function update() {
  indicator.style.transform = `translateX(${current * tabWidth()}px)`;

  document.querySelectorAll(".nav-item").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

update();

/* DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  nav.classList.add("dragging");
});

nav.addEventListener("touchmove", e => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - startX;
  let pos = current * tabWidth() + dx;

  indicator.style.transform = `translateX(${pos}px)`;
  indicator.dataset.pos = pos;
});

nav.addEventListener("touchend", () => {
  dragging = false;
  nav.classList.remove("dragging");

  let pos = parseFloat(indicator.dataset.pos || 0);

  current = pos > tabWidth() / 2 ? 1 : 0;

  update();
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el, i) => {
  el.onclick = () => {
    current = i;
    update();
  };
});
</script>

</body>
</html>
