<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --blue: #007aff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
  -webkit-user-select: none;
  user-select: none;
  overflow: hidden; /* Фиксируем body */
  overscroll-behavior: none; /* Отключаем pull-to-refresh и оттягивание */
  touch-action: none; /* Запрещаем стандартные жесты браузера */
  height: 100vh;
  width: 100vw;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  overflow: hidden;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background: linear-gradient(
    135deg,
    #6a11cb,
    #8b3fd1,
    #b16cea,
    #a05cc4,
    #7a2fb0,
    #6a11cb,
    #b16cea
  );
  background-size: 300% 300%;
  animation: shimmerGradient 8s ease infinite;
  flex-shrink: 0; /* Не сжимать */
}

@keyframes shimmerGradient {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 7px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
  pointer-events: none;
  -webkit-user-drag: none;
}

/* SEARCH BAR */
.search-bar {
  margin: 12px 16px 0 16px;
  background: #fff;
  border-radius: 100px;
  padding: 0 18px;
  height: 46px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  flex-shrink: 0;
}

.search-bar svg {
  width: 20px;
  height: 20px;
  fill: #999;
  flex-shrink: 0;
  pointer-events: none;
}

.search-bar input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  color: #000;
  width: 100%;
  font-family: -apple-system, sans-serif;
  -webkit-user-select: text;
  user-select: text;
}

.search-bar input::placeholder {
  color: #999;
}

/* MAIN SCROLL AREA */
.page-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 100px; /* Отступ под навигацию */
  width: 100%;
  touch-action: pan-y; /* Разрешаем вертикальный скролл внутри контента */
}

/* LAYOUT WRAPPER */
.page-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* COLLECTION SECTIONS */
.catalog-section {
  margin: 12px 0 0 0;
  background: #e5e5e5;
  border-radius: 0;
  padding: 16px 0 16px 0;
  width: 100%;
}

.catalog-section-inner {
  transform: translateY(-2px);
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  color: #1a1a1a;
  margin: 0 0 12px 0;
  text-align: center;
  letter-spacing: -0.3px;
  pointer-events: none;
}

/* FEATURED PRODUCT */
.featured-product {
  margin: 0 16px 12px 16px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.featured-photo {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background-color 0.3s ease;
  touch-action: pan-y; /* Разрешаем вертикальный скролл, если нужно, но перехватываем горизонтальный */
}

.featured-photo[data-state="0"] { background-color: #e0f5d0; }
.featured-photo[data-state="1"] { background-color: #f5e0e8; }
.featured-photo[data-state="2"] { background-color: #e8d5f5; }

.featured-photo .dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  pointer-events: auto;
}

.featured-photo .dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  cursor: pointer;
  touch-action: manipulation;
  transition: background 0.2s ease, transform 0.2s ease;
}

.featured-photo .dots span.active {
  background: rgba(0,0,0,0.5);
  transform: scale(1.2);
}

.featured-info {
  padding: 10px 14px 12px 14px;
  pointer-events: none;
}

.featured-name {
  font-size: 16px;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0 0 2px 0;
}

.featured-price {
  font-size: 14px;
  color: #666;
  margin: 0;
  font-weight: 500;
}

/* PRODUCT SLIDER */
.product-slider {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 0 16px 4px 16px;
  touch-action: pan-y; /* Важно: разрешаем вертикальный скролл страницы при касании слайдера */
  -ms-overflow-style: none;
}

.product-slider::-webkit-scrollbar {
  display: none;
}

.product-card {
  flex: 0 0 calc(50% - 5px);
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
}

.product-photo {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background-color 0.3s ease;
  touch-action: pan-y; 
}

.product-photo[data-state="0"] { background-color: #e0f5d0; }
.product-photo[data-state="1"] { background-color: #f5e0e8; }
.product-photo[data-state="2"] { background-color: #e8d5f5; }

.product-photo .dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  pointer-events: auto;
}

.product-photo .dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  cursor: pointer;
  touch-action: manipulation;
  transition: background 0.2s ease, transform 0.2s ease;
}

.product-photo .dots span.active {
  background: rgba(0,0,0,0.5);
  transform: scale(1.2);
}

.product-info {
  padding: 8px 10px 10px 10px;
  pointer-events: auto; /* Включаем события для скролла */
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.product-name {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a1a;
  margin: 0 0 2px 0;
}

.product-price {
  font-size: 13px;
  color: #666;
  margin: 0;
  font-weight: 500;
}

/* SCROLL INDICATOR */
.scroll-indicator {
  height: 3px;
  background: rgba(0,0,0,0.15);
  border-radius: 100px;
  margin: 10px 16px 0 16px;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

.scroll-indicator-thumb {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: #fff;
  border-radius: 100px;
  transition: left 0.1s ease-out;
  box-shadow: 0 0 4px rgba(0,0,0,0.1);
  will-change: left, width;
  cursor: grab;
  touch-action: none;
}

.scroll-indicator-thumb:active {
  cursor: grabbing;
  background: #eee;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 56px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(20px);
  border-radius: 100px;
  display: flex;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  z-index: 100;
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 100px;
  background: rgba(240, 240, 240, 0.95);
  transition: transform 0.25s ease;
  pointer-events: none;
  will-change: transform;
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 13px;
  color: #000;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  font-weight: 500;
  cursor: pointer;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: #000;

  pointer-events: none;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  display: none;
}

.page.active-page {
  display: flex; /* Используем flex для фиксации структуры */
}

</style>
</head>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// --- ВАЖНО: Блокировка сворачивания приложения свайпом вниз ---
if (tg.disableVerticalSwipes) {
    tg.disableVerticalSwipes();
}
// -------------------------------------------------------------

const nav = document.getElementById("nav");
const indicator = document.getElementById("indicator");
const body = document.body;

const pages = [
  document.getElementById("home"),
  document.getElementById("profile")
];

let current = 0;
let startX = 0;
let dragging = false;
let basePos = 0;

function tabWidth() {
  return indicator.offsetWidth;
}

function setIndicator(x, scale = 1) {
  indicator.style.transform = `translateX(${x}px) scale(${scale})`;
}

function update(animate = true) {
  indicator.style.transition = animate ? 'transform 0.25s ease' : 'none';
  
  let x = current * tabWidth();
  setIndicator(x, 1);

  pages.forEach((p, i) => {
      if (i === current) {
          p.classList.add('active-page');
          p.style.display = 'flex'; // Восстанавливаем flex
      } else {
          p.classList.remove('active-page');
          p.style.display = 'none';
      }
  });

  document.querySelectorAll(".nav-item").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

update(true);

/* NAV DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  basePos = current * tabWidth();
  
  indicator.style.transition = 'none';
  setIndicator(basePos, 1.3);
}, { passive: false });

nav.addEventListener("touchmove", e => {
  if (!dragging) return;
  e.preventDefault();

  let dx = e.touches[0].clientX - startX;
  let pos = basePos + dx;

  let max = tabWidth();
  pos = Math.max(0, Math.min(max, pos));

  setIndicator(pos, 1.3);
  indicator.dataset.pos = pos;
}, { passive: false });

nav.addEventListener("touchend", () => {
  if (!dragging) return;
  dragging = false;

  let pos = parseFloat(indicator.dataset.pos || 0);
  let threshold = tabWidth() / 2;
  
  const targetTab = pos > threshold ? 1 : 0;
  
  if (targetTab !== current) {
    current = targetTab;
  }
  
  update(true);
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el, i) => {
  el.onclick = () => {
    current = i;
    update(true);
  };
});

/* PRODUCT SLIDER WITH IMPROVED DRAGGABLE THUMB */
function initSlider(sliderId, thumbId) {
  const slider = document.getElementById(sliderId);
  const thumb = document.getElementById(thumbId);
  if (!slider || !thumb) return;

  let isDraggingThumb = false;
  let startX = 0;
  let startScrollLeft = 0;

  function updateThumb() {
    const products = slider.querySelectorAll('.product-card');
    const totalProducts = products.length;
    if (totalProducts === 0) return;

    const visibleWidth = slider.clientWidth;
    const scrollWidth = slider.scrollWidth;
    const maxScroll = scrollWidth - visibleWidth;
    
    if (maxScroll <= 0) {
        thumb.style.display = 'none';
        return;
    } else {
        thumb.style.display = 'block';
    }

    const thumbWidthPercent = (visibleWidth / scrollWidth) * 100;
    const scrollLeft = slider.scrollLeft;
    const thumbLeftPercent = (scrollLeft / maxScroll) * (100 - thumbWidthPercent);
    
    thumb.style.width = thumbWidthPercent + '%';
    thumb.style.left = thumbLeftPercent + '%';
  }

  // --- Обработчики для перетаскивания ползунка ---
  
  function onThumbStart(e) {
    isDraggingThumb = true;
    startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    startScrollLeft = slider.scrollLeft;
    thumb.style.transition = 'none';
    e.stopPropagation(); 
  }

  function onThumbMove(e) {
    if (!isDraggingThumb) return;
    e.preventDefault(); 
    
    const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    const deltaX = currentX - startX;
    
    const indicatorContainer = thumb.parentElement;
    const containerWidth = indicatorContainer.offsetWidth;
    const thumbWidth = thumb.offsetWidth;
    const availableThumbMovePx = containerWidth - thumbWidth;
    
    if (availableThumbMovePx <= 0) return;

    const maxScroll = slider.scrollWidth - slider.clientWidth;
    const scrollDelta = deltaX * (maxScroll / availableThumbMovePx);
    
    slider.scrollLeft = startScrollLeft + scrollDelta;
  }

  function onThumbEnd() {
    if (isDraggingThumb) {
      isDraggingThumb = false;
      thumb.style.transition = 'left 0.1s ease-out';
    }
  }

  thumb.addEventListener('touchstart', onThumbStart, { passive: false });
  thumb.addEventListener('mousedown', onThumbStart);

  window.addEventListener('touchmove', onThumbMove, { passive: false });
  window.addEventListener('mousemove', onThumbMove);
  
  window.addEventListener('touchend', onThumbEnd);
  window.addEventListener('mouseup', onThumbEnd);

  slider.addEventListener("scroll", updateThumb, { passive: true });
  
  setTimeout(updateThumb, 100);
  window.addEventListener("resize", updateThumb);
}

initSlider('slider1', 'thumb1');
initSlider('slider2', 'thumb2');

/* PHOTO SWIPE LOGIC & DOT CLICK */
function initPhotoInteractions(containerSelector, photoSelector, dotsSelector) {
  document.querySelectorAll(containerSelector).forEach(card => {
    const photo = card.querySelector(photoSelector);
    const dots = Array.from(card.querySelectorAll(dotsSelector));
    const totalStates = dots.length;
    
    // Click on dots
    dots.forEach((dot, idx) => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        setActiveState(idx);
      });
    });

    function setActiveState(idx) {
        dots.forEach(d => d.classList.remove('active'));
        dots[idx].classList.add('active');
        photo.dataset.state = idx;
    }

    // Swipe Logic
    let touchStartX = 0;
    let touchEndX = 0;
    let currentState = 0;

    photo.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    photo.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        const threshold = 30; // Минимальное расстояние для свайпа
        const diff = touchStartX - touchEndX;

        // Получаем текущий индекс из dataset или активной точки
        currentState = parseInt(photo.dataset.state) || 0;

        if (Math.abs(diff) > threshold) {
            if (diff > 0) {
                // Свайп влево -> Следующее фото
                let next = currentState + 1;
                if (next >= totalStates) next = 0; // Циклично
                setActiveState(next);
            } else {
                // Свайп вправо -> Предыдущее фото
                let prev = currentState - 1;
                if (prev < 0) prev = totalStates - 1; // Циклично
                setActiveState(prev);
            }
        }
    }
  });
}

initPhotoInteractions('.featured-product', '.featured-photo', '.featured-photo .dots span');
initPhotoInteractions('.product-card', '.product-photo', '.product-photo .dots span');

// Prevent double tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

</script>
