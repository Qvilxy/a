<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --blue: #007aff;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
  -webkit-user-select: none;
  user-select: none;
  overflow-x: hidden;
}

/* HEADER */
.header {
  height: 100px;
  position: relative;
  overflow: hidden;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background: linear-gradient(
    135deg,
    #6a11cb,
    #8b3fd1,
    #b16cea,
    #a05cc4,
    #7a2fb0,
    #6a11cb,
    #b16cea
  );
  background-size: 300% 300%;
  animation: shimmerGradient 8s ease infinite;
}

@keyframes shimmerGradient {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGO */
.logo {
  position: absolute;
  top: calc(50% + 7px);
  left: 50%;
  transform: translate(-50%,-50%);
  width: 60px;
}

/* SEARCH BAR */
.search-bar {
  margin: 12px 16px 0 16px;
  background: #fff;
  border-radius: 100px;
  padding: 0 18px;
  height: 46px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.search-bar svg {
  width: 20px;
  height: 20px;
  fill: #999;
  flex-shrink: 0;
}

.search-bar input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  color: #000;
  width: 100%;
  font-family: -apple-system, sans-serif;
}

.search-bar input::placeholder {
  color: #999;
}

/* COLLECTION BANNER */
.collection-banner {
  margin: 12px 0 0 0;       /* убраны боковые отступы */
  background: #e5e5e5;
  border-radius: 0;          /* убрано скругление */
  padding: 16px 0 12px 0;    /* боковые паддинги перенесены в слайдер */
  width: 100%;
}

.collection-title {
  font-size: 22px;
  font-weight: 800;
  color: #1a1a1a;
  margin: 0 0 12px 0;
  padding: 0 16px;           /* отступ заголовка */
  letter-spacing: -0.3px;
}

/* PRODUCT SLIDER */
.product-slider {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overscroll-behavior-x: contain; /* предотвращает скролл страницы при достижении края */
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 0 16px 4px 16px;       /* отступы по бокам внутри баннера */
}

.product-slider::-webkit-scrollbar {
  display: none;
}

.product-card {
  flex: 0 0 calc(50% - 5px);
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.product-photo {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  background: #e0f5d0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.product-photo .dots {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
}

.product-photo .dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
}

.product-photo .dots span.active {
  background: rgba(0,0,0,0.5);
}

.product-info {
  padding: 8px 10px 10px 10px;
}

.product-name {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a1a;
  margin: 0 0 2px 0;
}

.product-price {
  font-size: 13px;
  color: #666;
  margin: 0;
  font-weight: 500;
}

/* SCROLL INDICATOR */
.scroll-indicator {
  height: 3px;
  background: rgba(0,0,0,0.15);
  border-radius: 100px;
  margin: 10px 16px 0 16px;
  position: relative;
  overflow: hidden;
}

.scroll-indicator-thumb {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: #fff;
  border-radius: 100px;
  transition: left 0.1s ease-out;
  box-shadow: 0 0 4px rgba(0,0,0,0.1);
  will-change: left, width;
}

/* CONTENT (fallback) */
.content {
  padding: 12px 16px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 56px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(20px);
  border-radius: 100px;
  display: flex;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* INDICATOR */
.indicator {
  position: absolute;
  height: calc(100% - 12px);
  width: calc(50% - 6px);
  border-radius: 100px;
  background: rgba(240, 240, 240, 0.95);
  transition: transform 0.25s ease;
  pointer-events: none;
  will-change: transform;
}

/* NAV ITEMS */
.nav-item {
  flex: 1;
  text-align: center;
  font-size: 13px;
  color: #000;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  font-weight: 500;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  fill: #000;
  margin-bottom: 2px;
}

.nav-item.active {
  color: var(--blue);
}

.nav-item.active svg {
  fill: var(--blue);
}

/* PAGES */
.page {
  position: absolute;
  inset: 0;
  padding-bottom: 100px;
}

body.no-scroll {
  overflow: hidden;
  touch-action: none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>

  <div class="search-bar">
    <svg viewBox="0 0 24 24">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input type="text" placeholder="Поиск" />
  </div>

  <!-- Collection Banner -->
  <div class="collection-banner">
    <h2 class="collection-title">Название коллекции</h2>

    <div class="product-slider" id="productSlider">

      <!-- Товар 1 -->
      <div class="product-card">
        <div class="product-photo">
          <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="product-info">
          <p class="product-name">Название товара</p>
          <p class="product-price">Цена</p>
        </div>
      </div>

      <!-- Товар 2 -->
      <div class="product-card">
        <div class="product-photo">
          <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="product-info">
          <p class="product-name">Название товара</p>
          <p class="product-price">Цена</p>
        </div>
      </div>

      <!-- Товар 3 -->
      <div class="product-card">
        <div class="product-photo">
          <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="product-info">
          <p class="product-name">Название товара</p>
          <p class="product-price">Цена</p>
        </div>
      </div>

    </div>

    <!-- Ползунок скролла -->
    <div class="scroll-indicator">
      <div class="scroll-indicator-thumb" id="scrollThumb"></div>
    </div>
  </div>

  <div class="content"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page" style="display:none;">
  <div class="header">
    <img src="logoredbox.png" class="logo">
  </div>
  <div class="content">
    <h2>Профиль</h2>
  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
  <div class="indicator" id="indicator"></div>

  <div class="nav-item active">
    <svg viewBox="0 0 24 24">
      <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>
    </svg>
    Каталог
  </div>

  <div class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>
    </svg>
    Профиль
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const nav = document.getElementById("nav");
const indicator = document.getElementById("indicator");
const body = document.body;

const pages = [
  document.getElementById("home"),
  document.getElementById("profile")
];

let current = 0;
let startX = 0;
let dragging = false;
let basePos = 0;

function tabWidth() {
  return indicator.offsetWidth;
}

function setIndicator(x, scale = 1) {
  indicator.style.transform = `translateX(${x}px) scale(${scale})`;
}

function update(animate = true) {
  indicator.style.transition = animate ? 'transform 0.25s ease' : 'none';
  
  let x = current * tabWidth();
  setIndicator(x, 1);

  pages[0].style.display = current === 0 ? "block" : "none";
  pages[1].style.display = current === 1 ? "block" : "none";

  document.querySelectorAll(".nav-item").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

update(true);

/* NAV DRAG */
nav.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  dragging = true;
  basePos = current * tabWidth();
  
  body.classList.add("no-scroll");
  
  indicator.style.transition = 'none';
  setIndicator(basePos, 1.3);
}, { passive: true });

nav.addEventListener("touchmove", e => {
  if (!dragging) return;
  e.preventDefault();

  let dx = e.touches[0].clientX - startX;
  let pos = basePos + dx;

  let max = tabWidth();
  pos = Math.max(0, Math.min(max, pos));

  setIndicator(pos, 1.3);
  indicator.dataset.pos = pos;
}, { passive: false });

nav.addEventListener("touchend", () => {
  if (!dragging) return;
  dragging = false;

  body.classList.remove("no-scroll");

  let pos = parseFloat(indicator.dataset.pos || 0);
  let threshold = tabWidth() / 2;
  
  const targetTab = pos > threshold ? 1 : 0;
  
  if (targetTab !== current) {
    current = targetTab;
  }
  
  update(true);
});

/* TAP */
document.querySelectorAll(".nav-item").forEach((el, i) => {
  el.onclick = () => {
    current = i;
    update(true);
  };
});

/* PRODUCT SLIDER SCROLL INDICATOR */
const slider = document.getElementById("productSlider");
const thumb = document.getElementById("scrollThumb");

function updateScrollThumb() {
  if (!slider) return;

  const scrollLeft = slider.scrollLeft;
  const scrollWidth = slider.scrollWidth;
  const clientWidth = slider.clientWidth;
  
  const thumbWidthPercent = (clientWidth / scrollWidth) * 100;
  const maxScroll = scrollWidth - clientWidth;
  const thumbLeftPercent = maxScroll > 0 ? (scrollLeft / maxScroll) * (100 - thumbWidthPercent) : 0;
  
  thumb.style.width = thumbWidthPercent + '%';
  thumb.style.left = thumbLeftPercent + '%';
}

slider.addEventListener("scroll", updateScrollThumb, { passive: true });

window.addEventListener("load", () => {
  setTimeout(updateScrollThumb, 100);
});

window.addEventListener("resize", updateScrollThumb);
</script>

</body>
</html>
